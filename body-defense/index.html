  ctx.beginPath(); ctx.arc(0, 0, 16 + pulse * 4, 0, Math.PI * 2); ctx.stroke();
}

/* T 细胞 (Cytotoxic T)：圆形小型 + 极大单核占满 + 蓝色胞质 */
function drawTCell(t, opts = {}) {
  const seed = ((opts.seed || 0) * 1000) | 0;
  drawGlowDisc(17, '#a8c8e8', 'rgba(120, 160, 220, 0.4)');
  // 胞质（淡蓝，很薄）
  const grad = ctx.createRadialGradient(-3, -4, 1, 0, 0, 17);
  grad.addColorStop(0, '#cee0f6');
  grad.addColorStop(0.6, '#7aa4d4');
  grad.addColorStop(1, '#3a5a90');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, 17, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2a3e60'; ctx.lineWidth = 0.9; ctx.stroke();
  // 巨大单核（占细胞 70%，淋巴细胞特征）
  const ng = ctx.createRadialGradient(-3, -4, 2, 0, 0, 13);
  ng.addColorStop(0, '#5a3aa8');
  ng.addColorStop(0.6, '#2a1a78');
  ng.addColorStop(1, '#0a0a3a');
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1a0533'; ctx.lineWidth = 0.7; ctx.stroke();
  // 染色质（核内深色斑块，T 细胞特有的"团块状"）
  ctx.fillStyle = '#0a0a3a';
  [[-4, -3], [3, -4], [-2, 4], [5, 2], [0, -1], [-5, 1]].forEach(([x, y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.3, 0, Math.PI * 2); ctx.fill();
  });
  // 细胞毒颗粒（少量、靠近膜，TCR/穿孔素）
  ctx.fillStyle = 'rgba(255, 60, 80, 0.85)';
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + 0.3;
    const r = 14;
    ctx.beginPath(); ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 1.3, 0, Math.PI * 2); ctx.fill();
  }
}

/* B 细胞：单核 + 较多胞质 + 高尔基体 + 浆细胞分泌抗体特征 */
function drawBCell(t, opts = {}) {
  const seed = ((opts.seed || 0) * 1000) | 0;
  drawGlowDisc(18, '#b8d8b8', 'rgba(120, 200, 140, 0.35)');
  // 椭圆胞质（B 细胞略呈卵圆）
  const grad = ctx.createRadialGradient(-3, -5, 2, 0, 0, 18);
  grad.addColorStop(0, '#dff0d8');
  grad.addColorStop(0.6, '#8ec48a');
  grad.addColorStop(1, '#3a6e3a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(0, 0, 18, 17, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#2a4a2a'; ctx.lineWidth = 0.9; ctx.stroke();
  // 胞质内点状抗体颗粒
  scatterGranules(10, 14, 'rgba(40, 90, 40, 0.55)', [0.6, 1.1], seed + 5);
  // 单核（偏心，圆形）
  ctx.save();
  ctx.translate(-3, -1);
  const ng = ctx.createRadialGradient(-3, -4, 1, 0, 0, 11);
  ng.addColorStop(0, '#5a8a5a');
  ng.addColorStop(0.7, '#1a4a1a');
  ng.addColorStop(1, '#0a2a0a');
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0a2a0a'; ctx.lineWidth = 0.8; ctx.stroke();
  // 染色质（粗块状，B 细胞特征"车轮"或"钟面"）
  ctx.fillStyle = '#0a1a0a';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const r = 6.5;
    ctx.beginPath(); ctx.ellipse(Math.cos(a) * r, Math.sin(a) * r, 1.4, 0.9, a, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // 偶尔分泌抗体（小 Y 形 → 表示分泌活性，保留游戏可读性）
  const release = (Math.sin(t * 0.8 + seed) + 1) * 0.5;
  if (release > 0.7) {
    const off = (release - 0.7) / 0.3;
    ctx.save();
    ctx.translate(12, -10 - off * 8);
    ctx.globalAlpha = 1 - off;
    ctx.strokeStyle = '#1a4a1a'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 3); ctx.lineTo(0, -1);
    ctx.moveTo(0, -1); ctx.lineTo(-2, -4);
    ctx.moveTo(0, -1); ctx.lineTo( 2, -4);
    ctx.stroke();
    ctx.restore();
  }
}

const TOWER_RENDERERS = {
  red_blood: drawRedBloodCell,
  neutrophil: drawNeutrophil,
  nk: drawNK,
  macrophage: drawMacrophage,
  platelet: drawPlatelet,
  t_cell: drawTCell,
  b_cell: drawBCell,
};

function drawTowerVisual(x, y, kind, opts = {}) {
  const def = TOWERS[kind];
  ctx.save();
  ctx.translate(x, y);
  const fn = TOWER_RENDERERS[kind];
  if (fn) fn(performance.now() / 1000, opts);
  ctx.restore();
}

function drawTower(tw, t) {
  const def = TOWERS[tw.kind];
  const redBloodEnvBonus = getRedBloodEnvironmentBonus(tw);

  // 血小板减速光环底层（在塔下面画）
  if (def.role === 'support' && def.auraRadius) {
    ctx.save();
    const pulse = (Math.sin(t * 1.5 + tw.x * 0.01) + 1) * 0.5;
    const r = def.auraRadius * TILE;
    const grad = ctx.createRadialGradient(tw.x, tw.y, 0, tw.x, tw.y, r);
    grad.addColorStop(0, 'rgba(255, 144, 200, 0.25)');
    grad.addColorStop(0.6, `rgba(255, 144, 200, ${0.08 + pulse * 0.07})`);
    grad.addColorStop(1, 'rgba(255, 144, 200, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(tw.x, tw.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = `rgba(255, 144, 200, ${0.3 + pulse * 0.3})`;
    ctx.lineWidth = 1; ctx.setLineDash([4, 6]); ctx.lineDashOffset = -t * 30;
    ctx.beginPath(); ctx.arc(tw.x, tw.y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (redBloodEnvBonus > 0) {
    ctx.save();
    const pulse = (Math.sin(t * 3 + tw.x * 0.02) + 1) * 0.5;
    const r = TILE * 0.46;
    const grad = ctx.createRadialGradient(tw.x, tw.y, 0, tw.x, tw.y, r);
    grad.addColorStop(0, `rgba(144, 220, 255, ${0.15 + pulse * 0.1})`);
    grad.addColorStop(1, 'rgba(144, 220, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(tw.x, tw.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(211, 244, 255, ${0.35 + pulse * 0.25})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(tw.x, tw.y, TILE * 0.32, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  const breath = 1 + Math.sin(t * 3 + tw.x * 0.01) * 0.03;
  ctx.save();
  ctx.translate(tw.x, tw.y);
  ctx.scale(breath, breath);
  const fn = TOWER_RENDERERS[tw.kind];
  if (fn) fn(t, { seed: tw.x * 0.01 + tw.y * 0.013 });
  // ===== Phase K · 双向战斗 + 塔有生命 (tower hit flash) =====
  if (tw.flash > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, tw.flash * 6);
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = '#ff3b6b';
    ctx.beginPath(); ctx.arc(0, 0, TILE * 0.36, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // ===== Phase K · 双向战斗 + 塔有生命 (tower HP bar) =====
  if (tw.maxHp && tw.hp < tw.maxHp) {
    const barW = 30, barH = 4;
    const bx = tw.x - barW / 2;
    const by = tw.y - TILE * 0.42;
    const pct = Math.max(0, tw.hp / tw.maxHp);
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
    ctx.fillStyle = pct > 0.5 ? '#5fff8f' : (pct > 0.25 ? '#ffd60a' : '#ff3b6b');
    ctx.fillRect(bx, by, barW * pct, barH);
    ctx.restore();
  }

  // attack range when selected/hover
  if (State.hoveredTower === tw && def.range) {
    ctx.save();
    ctx.strokeStyle = def.color;
    ctx.globalAlpha = 0.35;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.arc(tw.x, tw.y, def.range * TILE, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

/* 普通杆菌 (Bacillus)：椭圆杆状 + 鞭毛 + 内部 DNA 螺旋 */
function drawBacteria(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 5, def.radius * 0.85, 3, 0, 0, Math.PI * 2); ctx.fill();
  // 多根鞭毛（细菌通常多鞭毛）
  ctx.strokeStyle = def.stroke; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
  for (let f = 0; f < 3; f++) {
    const yOff = (f - 1) * 4;
    ctx.beginPath();
    for (let i = 0; i <= 14; i++) {
      const x = -def.radius - 2 - i * 2.2;
      const y = yOff + Math.sin(t * 12 + i * 0.6 + e.id + f) * 2.2;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // 杆状胞体（细胞壁清晰）
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-3, -5, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#a8e8c8');
    bg.addColorStop(0.55, '#5db086');
    bg.addColorStop(1, '#1f5a3a');
    ctx.fillStyle = bg;
  }
  ctx.beginPath(); ctx.ellipse(0, 0, def.radius * 1.15, def.radius * 0.78, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0f3a22'; ctx.lineWidth = 1.4; ctx.stroke();
  // 二层细胞壁（细线）
  ctx.strokeStyle = 'rgba(15, 58, 34, 0.4)'; ctx.lineWidth = 0.6;
  ctx.beginPath(); ctx.ellipse(0, 0, def.radius * 0.95, def.radius * 0.6, 0, 0, Math.PI * 2); ctx.stroke();
  if (e.flash > 0) return;
  // 内部 DNA 类核区（弯曲细线）
  ctx.strokeStyle = '#0f3a22'; ctx.lineWidth = 0.9; ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i <= 16; i++) {
    const x = -def.radius * 0.7 + i * (def.radius * 1.4 / 16);
    const y = Math.sin(i * 0.7 + e.id) * 2.2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  // 细胞质颗粒（核糖体）
  ctx.fillStyle = 'rgba(15, 58, 34, 0.6)';
  for (let i = 0; i < 6; i++) {
    const x = (i - 2.5) * 3 + Math.sin(i + e.id) * 1;
    const y = Math.cos(i * 1.2 + e.id) * 4;
    ctx.beginPath(); ctx.arc(x, y, 0.7, 0, Math.PI * 2); ctx.fill();
  }
}

/* 流感病毒 (Influenza)：球形包膜 + HA(三角)/NA(蘑菇) 表面糖蛋白 */
function drawVirus(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 4, def.radius * 0.7, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  // 表面糖蛋白：HA（血凝素，三角钉）和 NA（神经氨酸酶，蘑菇头）交替
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2 + t * 0.08;
    const isHA = i % 2 === 0;
    const baseR = def.radius - 1;
    const tipR = def.radius + (isHA ? 6 : 5);
    const x1 = Math.cos(a) * baseR, y1 = Math.sin(a) * baseR;
    const x2 = Math.cos(a) * tipR, y2 = Math.sin(a) * tipR;
    ctx.strokeStyle = '#5b1aa8'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    if (isHA) {
      // HA 三角形钉头
      ctx.fillStyle = '#7e2cd9';
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 + Math.cos(a + 0.25) * 2.2, y2 + Math.sin(a + 0.25) * 2.2);
      ctx.lineTo(x2 + Math.cos(a - 0.25) * 2.2, y2 + Math.sin(a - 0.25) * 2.2);
      ctx.closePath(); ctx.fill();
    } else {
      // NA 蘑菇头（圆球顶）
      ctx.fillStyle = '#9c4ed9';
      ctx.beginPath(); ctx.arc(x2, y2, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#5b1aa8'; ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  // 包膜
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-3, -4, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#e0b8ff');
    bg.addColorStop(0.5, '#a85ed9');
    bg.addColorStop(1, '#3d0a6e');
    ctx.fillStyle = bg;
  }
  ctx.beginPath(); ctx.arc(0, 0, def.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#3d0a6e'; ctx.lineWidth = 1.2; ctx.stroke();
  if (e.flash > 0) return;
  // 内部 RNA 螺旋（8 段，流感病毒为 8 节段 ssRNA）
  ctx.strokeStyle = 'rgba(40, 0, 80, 0.8)'; ctx.lineWidth = 0.8; ctx.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + e.id * 0.1;
    const r = def.radius * 0.55;
    const cx = Math.cos(a) * r * 0.5, cy = Math.sin(a) * r * 0.5;
    ctx.beginPath();
    for (let j = 0; j <= 8; j++) {
      const ja = j * 0.6 + i + e.id;
      const jx = cx + Math.cos(ja) * 1.4;
      const jy = cy + Math.sin(ja) * 1.4 + j * 0.4 - 1.6;
      if (j === 0) ctx.moveTo(jx, jy); else ctx.lineTo(jx, jy);
    }
    ctx.stroke();
  }
}

/* 葡萄球菌 (Staphylococcus)：成簇球菌 + 金黄色色素（"金葡菌"特征） */
function drawStaph(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 6, def.radius * 1.3, 4, 0, 0, Math.PI * 2); ctx.fill();
  // 葡萄串：8 颗大小不一球菌聚集，体现"葡萄状"特征
  const sats = [
    { dx: -11, dy: -1, r: 8.5 },
    { dx:  12, dy: -3, r: 7.8 },
    { dx:   3, dy: 12, r: 7.5 },
    { dx:  -7, dy: 10, r: 6.5 },
    { dx:  10, dy:  9, r: 6.5 },
    { dx:  -2, dy: -10, r: 6 },
  ];
  // 先画卫星球（在主球后面）
  for (const s of sats) {
    if (e.flash > 0) ctx.fillStyle = '#ffffff';
    else {
      const bg = ctx.createRadialGradient(s.dx - 2, s.dy - 3, 1, s.dx, s.dy, s.r);
      bg.addColorStop(0, '#ffe080');
      bg.addColorStop(0.6, '#d4a020');
      bg.addColorStop(1, '#5a3a08');
      ctx.fillStyle = bg;
    }
    ctx.beginPath(); ctx.arc(s.dx, s.dy, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#5a3a08'; ctx.lineWidth = 0.7; ctx.stroke();
    if (!(e.flash > 0)) {
      // 高光
      ctx.fillStyle = 'rgba(255, 240, 180, 0.5)';
      ctx.beginPath(); ctx.arc(s.dx - s.r * 0.3, s.dy - s.r * 0.4, s.r * 0.25, 0, Math.PI * 2); ctx.fill();
    }
  }
  // 主球
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-5, -7, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#fff0a8');
    bg.addColorStop(0.5, '#e0b830');
    bg.addColorStop(1, '#704808');
    ctx.fillStyle = bg;
  }
  ctx.beginPath(); ctx.arc(0, 0, def.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#704808'; ctx.lineWidth = 1.0; ctx.stroke();
  if (e.flash > 0) return;
  // 主球高光
  ctx.fillStyle = 'rgba(255, 240, 180, 0.55)';
  ctx.beginPath(); ctx.arc(-6, -8, 4, 0, Math.PI * 2); ctx.fill();
  // 表面微纹（细胞壁纹理）
  ctx.strokeStyle = 'rgba(112, 72, 8, 0.35)'; ctx.lineWidth = 0.4;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, def.radius - 2 - i * 2, 0, Math.PI * 2);
    ctx.stroke();
  }
}

/* 链球菌 (Streptococcus)：成链球菌 + 多糖荚膜（高护甲来源） */
function drawStrep(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 5, def.radius * 1.2, 4, 0, 0, Math.PI * 2); ctx.fill();
  // 后链段（背景中的链尾）
  const segs = [
    { dx: -16, dy: 1, r: 9 },
    { dx: -32, dy: 2, r: 8 },
  ];
  for (const s of segs) {
    // 多糖荚膜外圈
    ctx.fillStyle = 'rgba(180, 220, 200, 0.4)';
    ctx.beginPath(); ctx.arc(s.dx, s.dy, s.r + 2.5, 0, Math.PI * 2); ctx.fill();
    // 球菌主体
    const sg = ctx.createRadialGradient(s.dx - 2, s.dy - 3, 1, s.dx, s.dy, s.r);
    sg.addColorStop(0, '#c8f0a0');
    sg.addColorStop(0.6, '#5db030');
    sg.addColorStop(1, '#1f5a10');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(s.dx, s.dy, s.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#1f5a10'; ctx.lineWidth = 0.7; ctx.stroke();
  }
  // 主球菌的多糖荚膜（半透明厚外壳，体现护甲）
  ctx.fillStyle = 'rgba(180, 220, 200, 0.45)';
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(120, 180, 130, 0.6)'; ctx.lineWidth = 0.8;
  ctx.setLineDash([2, 2]);
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 3.5, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  // 主球菌
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-5, -6, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#daffb0');
    bg.addColorStop(0.5, '#6dc83d');
    bg.addColorStop(1, '#1f5a10');
    ctx.fillStyle = bg;
  }
  ctx.beginPath(); ctx.arc(0, 0, def.radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1f5a10'; ctx.lineWidth = 1.0; ctx.stroke();
  if (e.flash > 0) return;
  // 高光
  ctx.fillStyle = 'rgba(220, 255, 180, 0.55)';
  ctx.beginPath(); ctx.arc(-6, -8, 4, 0, Math.PI * 2); ctx.fill();
  // 内部颗粒（核糖体）
  ctx.fillStyle = 'rgba(15, 58, 16, 0.55)';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + e.id;
    const r = def.radius * 0.45;
    ctx.beginPath(); ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 0.9, 0, Math.PI * 2); ctx.fill();
  }
}

/* 肺炎球菌 (S. pneumoniae)：双球菌 + 厚多糖荚膜（精英特征） */
function drawPneumo(e, def, t) {
  const isTaunting = (e.tauntActive || 0) > 0;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 6, def.radius * 1.3, 5, 0, 0, Math.PI * 2); ctx.fill();
  // 嘲讽期：金色脉动（化学信号素）
  if (isTaunting) {
    const pulse = (Math.sin(t * 10) + 1) * 0.5;
    ctx.strokeStyle = `rgba(255, 214, 10, ${0.4 + pulse * 0.5})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, def.radius + 14 + pulse * 6, 0, Math.PI * 2); ctx.stroke();
  }
  // 厚多糖荚膜（最具肺炎球菌特征 — 双层）
  ctx.fillStyle = 'rgba(255, 200, 160, 0.4)';
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255, 200, 160, 0.25)';
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 9, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(180, 100, 60, 0.5)'; ctx.lineWidth = 0.8;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 6, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  // 双球菌（diplococcus 特征：成对长椭圆）
  // 上半球
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-5, -10, 1, 0, -8, def.radius * 0.85);
    bg.addColorStop(0, '#ffd9b8');
    bg.addColorStop(0.5, '#e07840');
    bg.addColorStop(1, '#7a2810');
    ctx.fillStyle = bg;
  }
  ctx.beginPath(); ctx.ellipse(0, -7, def.radius * 0.8, def.radius * 0.7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7a2810'; ctx.lineWidth = 1.0; ctx.stroke();
  // 下半球
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg2 = ctx.createRadialGradient(5, 6, 1, 0, 8, def.radius * 0.85);
    bg2.addColorStop(0, '#ffd9b8');
    bg2.addColorStop(0.5, '#e07840');
    bg2.addColorStop(1, '#7a2810');
    ctx.fillStyle = bg2;
  }
  ctx.beginPath(); ctx.ellipse(0, 7, def.radius * 0.8, def.radius * 0.7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#7a2810'; ctx.lineWidth = 1.0; ctx.stroke();
  if (e.flash > 0) return;
  // 高光
  ctx.fillStyle = 'rgba(255, 230, 200, 0.55)';
  ctx.beginPath(); ctx.arc(-5, -11, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(-5, 4, 3, 0, Math.PI * 2); ctx.fill();
  // 精英标识（科学风格：深色边框警示带）
  ctx.strokeStyle = '#ffd60a'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 12, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  // 嘲讽时显示文字标签（保留游戏可读性）
  if (isTaunting) {
    ctx.fillStyle = '#ffd60a';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('嘲讽中', 0, -def.radius - 18);
  }
}

/* 癌细胞：异型畸变细胞 + 多核（核染色质过深）+ 不规则核仁 + 异常分裂相 */
function drawCancer(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 5, def.radius * 1.0, 4, 0, 0, Math.PI * 2); ctx.fill();
  // 病变绿色微光（异常代谢）
  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, def.radius + 10);
  g.addColorStop(0, 'rgba(95, 255, 143, 0.35)'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 10, 0, Math.PI * 2); ctx.fill();
  // 高度不规则胞体（畸变细胞特征）
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-3, -5, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#a8a890');
    bg.addColorStop(0.5, '#5a5a4a');
    bg.addColorStop(1, '#1a1a14');
    ctx.fillStyle = bg;
  }
  ctx.beginPath();
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const wob = Math.sin(t * 1.5 + e.id + i * 1.6) * 3 + Math.sin(a * 7 + e.id) * 2;
    const r = def.radius + wob;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1a1a14'; ctx.lineWidth = 1.0; ctx.stroke();
  if (e.flash > 0) return;
  // 多核（异常多核现象，恶性细胞特征）
  const pulse = (Math.sin(t * 1.5) + 1) * 0.5;
  const nuclei = [
    { x: -6, y: -4, rx: 5.5, ry: 4.5, rot: 0.3 },
    { x:  5, y: -2, rx: 4.5, ry: 5.0, rot: -0.2 },
    { x: -1, y:  6, rx: 4.0, ry: 3.5, rot: 0.5 },
  ];
  for (const n of nuclei) {
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.rotate(n.rot);
    // 核（深染、异型）
    const ng = ctx.createRadialGradient(-1, -1, 0.5, 0, 0, n.rx);
    ng.addColorStop(0, '#3a4a3a');
    ng.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.ellipse(0, 0, n.rx, n.ry, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0a0a05'; ctx.lineWidth = 0.7; ctx.stroke();
    // 核仁（异常突出，绿色发光体现"异变"）
    ctx.fillStyle = `rgba(95, 255, 143, ${0.7 + pulse * 0.3})`;
    ctx.beginPath(); ctx.arc(0, 0, 1.6, 0, Math.PI * 2); ctx.fill();
    // 染色质块
    ctx.fillStyle = '#0a1a0a';
    ctx.beginPath(); ctx.arc(-2, -1, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 2, 1, 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawCancerSmall(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 3, def.radius * 0.9, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-2, -3, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#a8a890');
    bg.addColorStop(0.5, '#4a4a3a');
    bg.addColorStop(1, '#1a1a14');
    ctx.fillStyle = bg;
  }
  ctx.beginPath();
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    const wob = Math.sin(t * 3 + e.id + i) * 1.5;
    const r = def.radius + wob;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#1a1a14'; ctx.lineWidth = 0.8; ctx.stroke();
  if (e.flash > 0) return;
  // 单个深染异变核
  const ng = ctx.createRadialGradient(0, 0, 0.5, 0, 0, 6);
  ng.addColorStop(0, '#3a4a3a');
  ng.addColorStop(1, '#0a1a0a');
  ctx.fillStyle = ng;
  ctx.beginPath(); ctx.ellipse(0, 0, 6, 5, 0.3, 0, Math.PI * 2); ctx.fill();
  // 核仁
  const pulse = (Math.sin(t * 4 + e.id) + 1) * 0.5;
  ctx.fillStyle = `rgba(95, 255, 143, ${0.7 + pulse * 0.25})`;
  ctx.beginPath(); ctx.arc(0, 0, 1.4, 0, Math.PI * 2); ctx.fill();
}

/* BOSS 超级病原体：复合病原体（细菌+病毒嵌合）+ 三阶段染色变化 */
function drawBoss(e, def, t) {
  const phase = e.bossPhase || 1;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 8, def.radius * 1.3, 6, 0, 0, Math.PI * 2); ctx.fill();
  // 阶段染色：1 紫-粉、2 紫、3 红（炎症加剧）
  const phaseColor = phase === 3 ? '#a30030' : (phase === 2 ? '#5b1aa8' : '#7a1c64');
  const phaseLight = phase === 3 ? '#ff3b3b' : (phase === 2 ? '#a855ff' : '#ff2ec0');
  // 三层包膜（多重防御）
  for (let i = 0; i < 3; i++) {
    const r = def.radius + 8 + i * 6 + Math.sin(t * 1.5 + i) * 2;
    ctx.strokeStyle = phaseLight;
    ctx.globalAlpha = 0.25 - i * 0.06;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // 表面糖蛋白（病毒特征）— 16 根钉
  ctx.strokeStyle = phaseColor; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2 + t * 0.08;
    const x1 = Math.cos(a) * def.radius;
    const y1 = Math.sin(a) * def.radius;
    const x2 = Math.cos(a) * (def.radius + 8);
    const y2 = Math.sin(a) * (def.radius + 8);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    // 钉头蘑菇
    ctx.fillStyle = phaseLight;
    ctx.beginPath(); ctx.arc(x2, y2, 2, 0, Math.PI * 2); ctx.fill();
  }
  // 包膜
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-8, -10, 4, 0, 0, def.radius);
    bg.addColorStop(0, '#ffb0c8');
    bg.addColorStop(0.4, phaseLight);
    bg.addColorStop(1, phaseColor);
    ctx.fillStyle = bg;
  }
  ctx.beginPath();
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    const wob = Math.sin(t * 1.5 + e.id + i) * 2.5;
    const r = def.radius + wob;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = phaseColor; ctx.lineWidth = 2; ctx.stroke();
  if (e.flash > 0) return;
  // 高光
  ctx.fillStyle = 'rgba(255, 220, 230, 0.5)';
  ctx.beginPath(); ctx.ellipse(-10, -14, 8, 4, -0.5, 0, Math.PI * 2); ctx.fill();
  // 内部 RNA / DNA 螺旋（生物大分子）
  ctx.strokeStyle = 'rgba(20, 0, 30, 0.7)'; ctx.lineWidth = 1; ctx.lineCap = 'round';
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + e.id * 0.1;
    const cx = Math.cos(a) * def.radius * 0.4, cy = Math.sin(a) * def.radius * 0.4;
    ctx.beginPath();
    for (let j = 0; j <= 12; j++) {
      const ja = j * 0.55 + i + e.id;
      const jx = cx + Math.cos(ja) * 2.8;
      const jy = cy + Math.sin(ja) * 2.8 + j * 0.3 - 1.8;
      if (j === 0) ctx.moveTo(jx, jy); else ctx.lineTo(jx, jy);
    }
    ctx.stroke();
  }
  // 内部多个深染核区
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 + 0.4;
    const r = def.radius * 0.5;
    const cx = Math.cos(a) * r * 0.6, cy = Math.sin(a) * r * 0.6;
    ctx.fillStyle = 'rgba(20, 0, 30, 0.8)';
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = phaseLight;
    ctx.beginPath(); ctx.arc(cx, cy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  // 阶段标识（保留游戏可读性）
  ctx.fillStyle = phaseLight;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`阶段 ${phase}`, 0, -def.radius - 14);
}

// ===== Phase N.3 · L9 超级癌变群 BOSS 渲染（深绿色，区别 L6 粉紫 BOSS）=====
function drawMegaCancer(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 8, def.radius * 1.3, 6, 0, 0, Math.PI * 2); ctx.fill();
  const split = e.bossSplitDone;
  const phaseColor = split ? '#22633a' : '#1a4a28';
  const phaseLight = split ? '#7be3a7' : '#5fff8f';
  // 三层呼吸光环
  for (let i = 0; i < 3; i++) {
    const r = def.radius + 8 + i * 6 + Math.sin(t * 1.5 + i) * 2;
    ctx.strokeStyle = phaseLight;
    ctx.globalAlpha = 0.28 - i * 0.07;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // 表面凸起的癌变结节（外圈一圈不规则鼓包）
  ctx.fillStyle = phaseColor;
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + t * 0.05;
    const x = Math.cos(a) * (def.radius + 4);
    const y = Math.sin(a) * (def.radius + 4);
    ctx.beginPath(); ctx.arc(x, y, 5 + Math.sin(t * 2 + i) * 1.5, 0, Math.PI * 2); ctx.fill();
  }
  // 主体（高度不规则）
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-8, -10, 4, 0, 0, def.radius);
    bg.addColorStop(0, '#a8c890');
    bg.addColorStop(0.5, phaseColor);
    bg.addColorStop(1, '#08200f');
    ctx.fillStyle = bg;
  }
  ctx.beginPath();
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2;
    const wob = Math.sin(t * 1.4 + e.id + i * 0.7) * 3.5 + Math.sin(a * 5 + e.id) * 2;
    const r = def.radius + wob;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = phaseColor; ctx.lineWidth = 2; ctx.stroke();
  if (e.flash > 0) return;
  // 多个异变核 + 发光核仁
  const pulse = (Math.sin(t * 2) + 1) * 0.5;
  const nuclei = [
    { x: -10, y: -6, rx: 7, ry: 6 },
    { x:  8,  y: -4, rx: 6, ry: 7 },
    { x: -3,  y:  9, rx: 6, ry: 5 },
    { x: 11,  y:  9, rx: 5, ry: 5 },
  ];
  for (const n of nuclei) {
    const ng = ctx.createRadialGradient(n.x - 1, n.y - 1, 0.5, n.x, n.y, n.rx);
    ng.addColorStop(0, '#2a4a2a');
    ng.addColorStop(1, '#080f08');
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.ellipse(n.x, n.y, n.rx, n.ry, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#040804'; ctx.lineWidth = 0.7; ctx.stroke();
    ctx.fillStyle = `rgba(123, 227, 167, ${0.75 + pulse * 0.25})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, 2.2, 0, Math.PI * 2); ctx.fill();
  }
  // 标签
  ctx.fillStyle = phaseLight;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(split ? '分裂中' : '超级癌变群', 0, -def.radius - 14);
}

function drawMegaCancerChild(e, def, t) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, def.radius + 4, def.radius * 1.0, 4, 0, 0, Math.PI * 2); ctx.fill();
  // 微光环
  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, def.radius + 8);
  g.addColorStop(0, 'rgba(123, 227, 167, 0.4)');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, def.radius + 8, 0, Math.PI * 2); ctx.fill();
  // 主体
  if (e.flash > 0) ctx.fillStyle = '#ffffff';
  else {
    const bg = ctx.createRadialGradient(-4, -6, 1, 0, 0, def.radius);
    bg.addColorStop(0, '#88b08a');
    bg.addColorStop(0.6, '#22633a');
    bg.addColorStop(1, '#0a1f10');
    ctx.fillStyle = bg;
  }
  ctx.beginPath();
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * Math.PI * 2;
    const wob = Math.sin(t * 2 + e.id + i) * 2;
    const r = def.radius + wob;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#0a1f10'; ctx.lineWidth = 1; ctx.stroke();
  if (e.flash > 0) return;
  // 两个异变核
  const pulse = (Math.sin(t * 3 + e.id) + 1) * 0.5;
  for (const n of [{ x: -5, y: -3 }, { x: 5, y: 4 }]) {
    const ng = ctx.createRadialGradient(n.x - 1, n.y - 1, 0.5, n.x, n.y, 5);
    ng.addColorStop(0, '#2a4a2a');
    ng.addColorStop(1, '#080f08');
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.ellipse(n.x, n.y, 4.5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(123, 227, 167, ${0.75 + pulse * 0.25})`;
    ctx.beginPath(); ctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

const ENEMY_RENDERERS = {
  bacteria: drawBacteria,
  virus: drawVirus,
  staph: drawStaph,
  strep: drawStrep,
  pneumo: drawPneumo,
  cancer: drawCancer,
  cancer_small: drawCancerSmall,
  boss: drawBoss,
  mega_cancer: drawMegaCancer,
  mega_cancer_child: drawMegaCancerChild,
};

function drawEnemy(e, t) {
  const def = ENEMIES[e.kind];
  const wob = Math.sin(t * 6 + e.id) * 2;
  // ===== Phase K · 双向战斗 + 塔有生命 (lunge offset) =====
  let lungeDX = 0, lungeDY = 0;
  if (e.meleeLunge > 0) {
    const dx = e.meleeLungeX - e.x, dy = e.meleeLungeY - e.y;
    const d = Math.hypot(dx, dy) || 1;
    const amp = (e.meleeLunge / 0.1) * 6;
    lungeDX = (dx / d) * amp;
    lungeDY = (dy / d) * amp;
  }
  ctx.save();
  ctx.translate(e.x + lungeDX, e.y + wob + lungeDY);
  const fn = ENEMY_RENDERERS[e.kind];
  if (fn) fn(e, def, t);
  ctx.restore();

  if (e.markTimer > 0) {
    const pulse = (Math.sin(t * 12 + e.id) + 1) * 0.5;
    const ringR = def.radius + 14 + pulse * 4;
    const cy = e.y + wob;
    ctx.save();
    ctx.strokeStyle = `rgba(255, 214, 10, ${0.55 + pulse * 0.3})`;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(e.x, cy, ringR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.x - ringR - 5, cy);
    ctx.lineTo(e.x - ringR + 5, cy);
    ctx.moveTo(e.x + ringR - 5, cy);
    ctx.lineTo(e.x + ringR + 5, cy);
    ctx.moveTo(e.x, cy - ringR - 5);
    ctx.lineTo(e.x, cy - ringR + 5);
    ctx.moveTo(e.x, cy + ringR - 5);
    ctx.lineTo(e.x, cy + ringR + 5);
    ctx.stroke();
    ctx.fillStyle = '#ffd60a';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('标记', e.x, cy - ringR - 10);
    ctx.restore();
  }

  if (e.mutant) {
    const cy = e.y + wob;
    const pulse = (Math.sin(t * 10 + e.id) + 1) * 0.5;
    ctx.save();
    ctx.strokeStyle = `rgba(255, 46, 192, ${0.45 + pulse * 0.35})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.arc(e.x, cy, def.radius + 18 + pulse * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff2ec0';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.mutantLabel || '突变', e.x, cy - def.radius - 24);
    ctx.restore();
  }

  // ===== Phase L · 玩家操作扩展 (enemy name card on first sight) =====
  if (e.nameCardTimer > 0) {
    const remaining = e.nameCardTimer;
    const fadeIn = Math.min(1, (e.nameCardMax - remaining) / 0.2);
    const fadeOut = Math.min(1, remaining / 0.3);
    const alpha = Math.min(fadeIn, fadeOut);
    const cy = e.y + wob;
    const label = def.displayName || def.name || e.kind;
    ctx.save();
    ctx.font = 'bold 11px sans-serif';
    const tw = ctx.measureText(label).width;
    const pad = 6;
    const boxW = tw + pad * 2, boxH = 18;
    const bx = e.x - boxW / 2;
    const by = cy - def.radius - 32;
    ctx.globalAlpha = alpha * 0.92;
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 8); ctx.fill();
    } else {
      ctx.fillRect(bx, by, boxW, boxH);
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, e.x, by + boxH / 2);
    ctx.restore();
  }

  // HP bar (+ armor bar if any)
  const hpMax = e.maxHp || def.hp;
  const hasArmor = (e.armorMax || def.armor || 0) > 0;
  if (e.hp < hpMax || hasArmor) {
    const barW = def.radius * 2 + 4;
    const barH = 4;
    const bx = e.x - barW / 2;
    const by = e.y + wob - def.radius - 10;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
    ctx.fillStyle = '#3a0e22';
    ctx.fillRect(bx, by, barW, barH);
    const pct = Math.max(0, e.hp / hpMax);
    const grad2 = ctx.createLinearGradient(bx, 0, bx + barW, 0);
    grad2.addColorStop(0, '#ff3b6b');
    grad2.addColorStop(1, '#ff8caf');
    ctx.fillStyle = grad2;
    ctx.fillRect(bx, by, barW * pct, barH);
    // armor strip above
    if (hasArmor && e.armor > 0) {
      const ay = by - 6;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx - 1, ay - 1, barW + 2, 4);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(bx, ay, barW, 3);
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(bx, ay, barW * (e.armor / (e.armorMax || def.armor)), 3);
    }
  }
}

function drawBullet(b) {
  ctx.save();
  // trail
  if (b.trail.length > 1) {
    ctx.strokeStyle = b.def.trail;
    ctx.lineWidth = b.def.size * 1.4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    b.trail.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  }
  // head
  const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.def.size * 3);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, b.def.color);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.def.size * 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.def.size, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of State.particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBossInfectOverlay(t) {
  if (!State.bossInfectActive) return;
  // pulsing red border
  const pulse = (Math.sin(t * 6) + 1) * 0.5;
  ctx.save();
  ctx.strokeStyle = `rgba(255, 59, 107, ${0.45 + pulse * 0.35})`;
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, W - 8, H - 8);
  // dim path tiles with green tint
  ctx.fillStyle = `rgba(0, 100, 30, ${0.18 + pulse * 0.1})`;
  for (const tile of State.pathSet) {
    const [c, r] = tile.split(',').map(Number);
    ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
  }
  // bottom banner
  const txt = `⚠️ 路径感染中 · 塔禁用 ${Math.ceil(State.bossInfectTimer)}s`;
  ctx.font = 'bold 16px -apple-system, sans-serif';
  const w = ctx.measureText(txt).width + 60;
  const h = 38;
  const cx = W / 2, cy = H - 36;
  ctx.fillStyle = 'rgba(91, 0, 24, 0.92)';
  roundRect(ctx, cx - w / 2, cy - h / 2, w, h, 19); ctx.fill();
  ctx.strokeStyle = `rgba(255, 59, 107, ${0.6 + pulse * 0.4})`;
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#ff3b6b'; ctx.shadowBlur = 12;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(txt, cx, cy);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBossPhaseOverlay(t) {
  if (State.bossPhaseBannerTimer <= 0) return;
  const pulse = (Math.sin(t * 6) + 1) * 0.5;
  const title = State.bossPhaseBannerTitle;
  const lead = State.bossPhaseBannerLead;
  ctx.save();
  ctx.font = 'bold 18px -apple-system, sans-serif';
  const titleW = ctx.measureText(title).width;

function drawLevelEnvironment(t) {
  const env = State.levelEnv;
  if (!env || !State.level) return;
  ctx.save();
  if (State.level.id === 'L2') {
    const pulse = 0.22 + (Math.sin(t * 5) + 1) * 0.08;
    for (const [c, r] of env.ciliaTiles) {
      const x = c * TILE, y = r * TILE;
      ctx.fillStyle = `rgba(185, 150, 255, ${pulse})`;
      ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
      ctx.strokeStyle = 'rgba(231, 214, 255, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const px = x + 12 + i * 10;
        ctx.moveTo(px, y + TILE - 10);
        ctx.lineTo(px + Math.sin(t * 4 + c + i) * 3, y + 10);
      }
      ctx.stroke();
    }
  } else if (State.level.id === 'L3') {
    const zone = env.zones?.[State.gutFloraZoneIndex];
    if (zone) {
      const x = zone.x * TILE;
      const y = zone.y * TILE;
      const w = zone.w * TILE;
      const h = zone.h * TILE;
      const pulse = 0.16 + (Math.sin(t * 4.5) + 1) * 0.08;
      const grad = ctx.createRadialGradient(x + w * 0.5, y + h * 0.5, 10, x + w * 0.5, y + h * 0.5, Math.max(w, h) * 0.55);
      grad.addColorStop(0, `rgba(255, 207, 138, ${pulse + 0.12})`);
      grad.addColorStop(1, 'rgba(255, 207, 138, 0)');
      ctx.fillStyle = grad;
      roundRect(ctx, x, y, w, h, 24);
      ctx.fill();
      ctx.strokeStyle = `rgba(255, 207, 138, ${0.38 + pulse})`;
      ctx.lineWidth = 1.6;
      ctx.setLineDash([10, 8]);
      ctx.lineDashOffset = -t * 35;
      roundRect(ctx, x + 2, y + 2, w - 4, h - 4, 22);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  } else if (State.level.id === 'L4') {
    const pulse = 0.2 + (Math.sin(t * 3.8) + 1) * 0.09;
    for (const [c, r] of env.alveoliTiles) {
      const cx = c * TILE + TILE * 0.5;
      const cy = r * TILE + TILE * 0.5;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, TILE * 0.48);
      grad.addColorStop(0, `rgba(144, 220, 255, ${pulse + 0.18})`);
      grad.addColorStop(1, 'rgba(144, 220, 255, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, TILE * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `rgba(211, 244, 255, ${0.35 + pulse})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, TILE * 0.28, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(227, 250, 255, 0.85)';
      ctx.font = 'bold 12px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+O₂', cx, cy + 1);
    }
  } else if (State.level.id === 'L7') {
    // ===== Phase N.1 · L7 唾液波纹渲染 =====
    const waves = env.salivaWaves || [];
    for (const w of waves) {
      const pos = getSalivaWavePosition(w);
      const fade = w.dist > w.total ? Math.max(0, 1 - (w.dist - w.total) / env.salivaWidth) : 1;
      const grad = ctx.createRadialGradient(pos.x, pos.y, 4, pos.x, pos.y, env.salivaWidth);
      grad.addColorStop(0, `rgba(180, 230, 255, ${0.55 * fade})`);
      grad.addColorStop(0.6, `rgba(140, 200, 255, ${0.25 * fade})`);
      grad.addColorStop(1, 'rgba(120, 200, 255, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, env.salivaWidth, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `rgba(220, 245, 255, ${0.7 * fade})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, env.salivaWidth * 0.55, 0, Math.PI * 2); ctx.stroke();
    }
    // 倒计时小字 (next saliva)
    if (env.salivaTimer != null) {
      ctx.fillStyle = 'rgba(180, 230, 255, 0.65)';
      ctx.font = '12px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`下一波唾液 ${Math.max(0, env.salivaTimer).toFixed(1)}s`, 12, H - 22);
    }
  } else if (State.level.id === 'L8') {
    // ===== Phase N.2 · L8 路径相邻格高亮（红细胞 +1 O₂ 提示）=====
    if (env.adjacentSet) {
      const pulse = 0.18 + (Math.sin(t * 3.5) + 1) * 0.06;
      for (const key of env.adjacentSet) {
        const [c, r] = key.split(',').map(Number);
        const x = c * TILE, y = r * TILE;
        ctx.fillStyle = `rgba(255, 110, 140, ${pulse})`;
        ctx.fillRect(x + 5, y + 5, TILE - 10, TILE - 10);
        ctx.strokeStyle = `rgba(255, 160, 180, ${0.32 + pulse})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 5, y + 5, TILE - 10, TILE - 10);
      }
    }
  } else if (State.level.id === 'L9') {
    // ===== Phase N.3 · L9 入口标记 =====
    const paths = State.pathsPoints;
    if (paths) {
      const pulse = 0.4 + (Math.sin(t * 4) + 1) * 0.18;
      paths.forEach((pts, i) => {
        const p = pts[0];
        ctx.fillStyle = `rgba(123, 227, 167, ${pulse})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#0a2418';
        ctx.font = 'bold 11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`#${i + 1}`, p.x, p.y);
      });
    }
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =======================================================================
 *  GAMEPLAY HELPERS
 * ======================================================================= */
function buildPathPoints(level) {
  // ===== Phase N.3 · 多路径支持 (level.paths) =====
  // 兼容 level.path / level.pathTiles 单路径，新增 level.paths 数组（每条独立路径）
  if (level.paths && level.paths.length) {
    State.pathsPoints = level.paths.map(pt => pt.map(([c, r]) => ({
      x: c * TILE + TILE / 2,
      y: r * TILE + TILE / 2,
    })));
    // 主路径（默认 spawner 用 index 0），同时保留单路径接口
    State.pathPoints = State.pathsPoints[0];
    const all = [];
    for (const pt of level.paths) for (const cr of pt) all.push(cr);
    State.pathSet = new Set(all.map(([c, r]) => `${c},${r}`));
    return;
  }
  State.pathsPoints = null;
  State.pathPoints = level.pathTiles.map(([c, r]) => ({
    x: c * TILE + TILE / 2,
    y: r * TILE + TILE / 2,
  }));
  State.pathSet = new Set(level.pathTiles.map(([c, r]) => `${c},${r}`));
}

function makeTileSet(tiles = []) {
  return new Set(tiles.map(([c, r]) => `${c},${r}`));
}

function makeLevelEnvironment(level) {
  const env = LEVEL_ENVIRONMENTS[level.id];
  if (!env) return null;
  if (level.id === 'L2') {
    return { ...env, ciliaSet: makeTileSet(env.ciliaTiles) };
  }
  if (level.id === 'L4') {
    return { ...env, alveoliSet: makeTileSet(env.alveoliTiles) };
  }
  // ===== Phase N.1 · L7 唾液冲刷状态 =====
  if (level.id === 'L7') {
    return { ...env, salivaTimer: env.salivaInterval, salivaWaves: [] };
  }
  // ===== Phase N.2 · L8 路径相邻格集合（red_blood +O₂ 加成判定）=====
  if (level.id === 'L8') {
    const adj = new Set();
    const pathKeys = new Set(level.pathTiles.map(([c, r]) => `${c},${r}`));
    for (const [c, r] of level.pathTiles) {
      for (let dc = -1; dc <= 1; dc++) {
        for (let dr = -1; dr <= 1; dr++) {
          if (dc === 0 && dr === 0) continue;
          const nc = c + dc, nr = r + dr;
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
          const k = `${nc},${nr}`;
          if (pathKeys.has(k)) continue;
          adj.add(k);
        }
      }
    }
    return { ...env, adjacentSet: adj };
  }
  return { ...env };
}

function getCellKey(c, r) {
  return `${c},${r}`;
}

function getEnemyCell(e) {
  return cellAt(e.x, e.y);
}

function isEnemyInGutFloraZone(e) {
  const env = State.levelEnv;
  if (!env || State.level?.id !== 'L3' || State.gutFloraZoneIndex < 0) return false;
  const zone = env.zones?.[State.gutFloraZoneIndex];
  if (!zone) return false;
  const x0 = zone.x * TILE;
  const y0 = zone.y * TILE;
  const x1 = x0 + zone.w * TILE;
  const y1 = y0 + zone.h * TILE;
  return e.x >= x0 && e.x <= x1 && e.y >= y0 && e.y <= y1;
}

function getEnvironmentSpeedMul(e) {
  const env = State.levelEnv;
  if (!env || !State.level) return 1;
  if (State.level.id === 'L2') {
    const cell = getEnemyCell(e);
    if (cell && env.ciliaSet?.has(getCellKey(cell.c, cell.r))) return env.slowMul;
  } else if (State.level.id === 'L3' && isEnemyInGutFloraZone(e)) {
    return env.slowMul;
  }
  return 1;
}

// ===== Phase N.2 · L8 血流加速倍率（>1 加速）=====
function getEnvironmentSpeedBoost(e) {
  const env = State.levelEnv;
  if (!env || !State.level) return 1;
  if (State.level.id === 'L8') return env.bloodSpeedMul || 1;
  return 1;
}

function getRedBloodEnvironmentBonus(tw) {
  const env = State.levelEnv;
  if (!env || tw.kind !== 'red_blood') return 0;
  if (State.level?.id === 'L4') {
    return env.alveoliSet?.has(getCellKey(tw.gridC, tw.gridR)) ? env.redBloodBonus : 0;
  }
  // ===== Phase N.2 · L8 路径相邻格 +1 O₂/s =====
  if (State.level?.id === 'L8') {
    return env.adjacentSet?.has(getCellKey(tw.gridC, tw.gridR)) ? env.redBloodAdjacentBonus : 0;
  }
  return 0;
}

function setLevelEnvironmentNotice(text, duration = 3.6) {
  State.levelEnvNoticeText = text;
  State.levelEnvNoticeTimer = duration;
}

function advanceGutFloraZone(initial = false) {
  const env = State.levelEnv;
  if (!env || State.level?.id !== 'L3' || !env.zones?.length) return;
  State.gutFloraZoneIndex = initial
    ? 0
    : (State.gutFloraZoneIndex + 1) % env.zones.length;
  State.gutFloraShiftTimer = env.cycleInterval;
  const zone = env.zones[State.gutFloraZoneIndex];
  setLevelEnvironmentNotice(`🧫 菌群波动转移：${zone.label}`);
  pushFloater(W / 2, 156, `菌群压制区：${zone.label}`, '#ffcf8a');
  for (let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 2;
    State.particles.push({
      x: (zone.x + zone.w * 0.5) * TILE,
      y: (zone.y + zone.h * 0.5) * TILE,
      vx: Math.cos(a) * (45 + Math.random() * 60),
      vy: Math.sin(a) * (45 + Math.random() * 60),
      r: 2 + Math.random() * 2,
      color: 'rgba(255, 207, 138, 0.7)',
      life: 0.55 + Math.random() * 0.18,
      max: 0.7,
      gravity: 0,
    });
  }
}

// ===== Phase N.1 · L7 唾液冲刷波 =====
function spawnSalivaWave() {
  const env = State.levelEnv;
  if (!env) return;
  env.salivaWaves = env.salivaWaves || [];
  // 沿主路径推进的"位置"用累计距离表示，超过总路径长度后清除
  const pts = State.pathPoints;
  if (!pts || pts.length < 2) return;
  let totalLen = 0;
  for (let i = 1; i < pts.length; i++) totalLen += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
  env.salivaWaves.push({ dist: 0, total: totalLen });
  setLevelEnvironmentNotice('💧 唾液冲刷来袭', 2.4);
  pushFloater(pts[0].x, pts[0].y - 30, '唾液冲刷', '#9bdcff');
}

function getSalivaWavePosition(wave) {
  const pts = State.pathPoints;
  let acc = 0;
  for (let i = 1; i < pts.length; i++) {
    const segLen = Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
    if (acc + segLen >= wave.dist) {
      const t = (wave.dist - acc) / segLen;
      return { x: pts[i-1].x + (pts[i].x - pts[i-1].x) * t, y: pts[i-1].y + (pts[i].y - pts[i-1].y) * t };
    }
    acc += segLen;
  }
  const last = pts[pts.length - 1];
  return { x: last.x, y: last.y };
}

function updateSalivaWaves(dt) {
  const env = State.levelEnv;
  if (!env) return;
  env.salivaTimer -= dt;
  if (env.salivaTimer <= 0) {
    env.salivaTimer = env.salivaInterval;
    spawnSalivaWave();
  }
  env.salivaWaves = env.salivaWaves || [];
  for (const w of env.salivaWaves) {
    w.dist += env.salivaSpeed * dt;
    const pos = getSalivaWavePosition(w);
    // 命中范围内、还没在减速状态的敌人施加减速
    for (const e of State.enemies) {
      if (e.dead) continue;
      const d = Math.hypot(e.x - pos.x, e.y - pos.y);
      if (d <= env.salivaWidth) {
        if (e.slowTimer < env.salivaSlowDuration) {
          e.slowFactor = Math.min(e.slowFactor, env.salivaSlowMul);
          e.slowTimer = env.salivaSlowDuration;
        }
      }
    }
  }
  env.salivaWaves = env.salivaWaves.filter(w => w.dist <= w.total + env.salivaWidth);
}

function cellAt(px, py) {
  const c = Math.floor(px / TILE), r = Math.floor(py / TILE);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  return { c, r };
}

// ===== Phase L · 玩家操作扩展 (allow 2 towers per cell) =====
function towersAtCell(c, r) {
  let n = 0;
  for (const tw of State.towers) if (tw.gridC === c && tw.gridR === r) n++;
  return n;
}
function isPlaceable(c, r) {
  if (State.pathSet.has(`${c},${r}`)) return false;
  if (towersAtCell(c, r) >= 2) return false;
  return true;
}

function moveAlongPath(e, dt) {
  // ===== Phase N.3 · 多路径关卡: 用敌人 pathIndex 选路径 =====
  const pts = (State.pathsPoints) ? (State.pathsPoints[e.pathIndex || 0] || State.pathPoints) : State.pathPoints;
  let speedMul = State.upgradeState?.enemySpeedMul || 1;
  for (const tw of State.towers) {
    const td = TOWERS[tw.kind];
    if (td.role !== 'support' || !td.auraRadius) continue;
    const d = Math.hypot(tw.x - e.x, tw.y - e.y);
    if (d <= td.auraRadius * TILE) speedMul = Math.min(speedMul, td.slowFactor);
  }
  if (e.slowTimer > 0) speedMul = Math.min(speedMul, e.slowFactor);
  if (State.feverActive) speedMul = Math.min(speedMul, FEVER_SLOW_FACTOR);
  speedMul = Math.min(speedMul, getEnvironmentSpeedMul(e));
  // BOSS 狂暴加速
  let baseSpeed = e.speed;
  if (e.bossEnraged) baseSpeed *= ENEMIES[e.kind].boss.enrage.speedMul;
  // ===== Phase N.2 · L8 血流加速 =====
  baseSpeed *= getEnvironmentSpeedBoost(e);
  let remaining = baseSpeed * speedMul * dt;
  while (remaining > 0 && e.segIdx < pts.length - 1) {
    const a = pts[e.segIdx], b = pts[e.segIdx + 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const segLen = Math.hypot(dx, dy);
    const segRemain = segLen * (1 - e.segT);
    if (remaining < segRemain) {
      e.segT += remaining / segLen;
      e.x = a.x + dx * e.segT;
      e.y = a.y + dy * e.segT;
      remaining = 0;
    } else {
      remaining -= segRemain;
      e.segIdx++;
      e.segT = 0;
      e.x = b.x; e.y = b.y;
    }
  }
  return e.segIdx >= pts.length - 1;
}

function makeEnemy(kind, x, y, segIdx, segT, pathIndex) {
  const def = ENEMIES[kind];
  return {
    id: Math.random() * 1e6 | 0,
    kind, hp: def.hp, maxHp: def.hp, speed: def.speed,
    armor: def.armor || 0,
    armorMax: def.armor || 0,
    reward: def.reward,
    elite: !!def.elite,
    x, y, segIdx, segT,
    pathIndex: pathIndex || 0,
    flash: 0,
    dead: false,
    tauntCooldown: def.taunt ? def.taunt.interval : 0,
    tauntActive: 0,
    markTimer: 0,
    slowFactor: 1, slowTimer: 0,
    regenTimer: def.regen ? def.regen.interval : 0,
    bossPhase: def.boss ? 1 : 0,
    bossSummonTimer: def.boss && def.boss.summon ? def.boss.summon.interval : 0,
    bossInfectTimer: 0,
    bossEnraged: false,
    bossSplitDone: false,
    // ===== Phase K · 双向战斗 + 塔有生命 (enemy melee state) =====
    meleeCdTimer: 0,
    meleeLunge: 0,
    meleeLungeX: 0,
    meleeLungeY: 0,
  };
}

function applyMutantElite(enemy) {
  const ev = State.activeWaveEvent;
  if (!ev || ev.id !== 'mutant') return enemy;
  enemy.hp = Math.round(enemy.hp * ev.hpMul);
  enemy.maxHp = enemy.hp;
  enemy.speed *= ev.speedMul;
  enemy.reward = Math.round(enemy.reward * ev.rewardMul);
  if (enemy.armor > 0) {
    enemy.armor = Math.round(enemy.armor * ev.armorMul);
    enemy.armorMax = enemy.armor;
  }
  enemy.elite = true;
  enemy.mutant = true;
  enemy.mutantLabel = '突变';
  return enemy;
}

function spawnEnemy(kind, pathIndex) {
  // ===== Phase N.3 · 多路径关卡 spawn =====
  const pts = (State.pathsPoints && pathIndex != null)
    ? State.pathsPoints[pathIndex] || State.pathPoints
    : State.pathPoints;
  const start = pts[0];
  let enemy = makeEnemy(kind, start.x, start.y, 0, 0, pathIndex || 0);
  if (State.pendingMutantCount > 0 && State.pendingMutantKind === kind) {
    enemy = applyMutantElite(enemy);
    State.pendingMutantCount--;
    pushFloater(enemy.x, enemy.y - 26, '⚠ 突变精英', '#ff2ec0');
    State.shake = Math.max(State.shake, 10);
  }
  // ===== Phase L · 玩家操作扩展 (first-sight name card) =====
  if (State.enemyNameSeen && !State.enemyNameSeen.has(kind)) {
    State.enemyNameSeen.add(kind);
    enemy.nameCardTimer = 1.5;
    enemy.nameCardMax = 1.5;
  }
  State.enemies.push(enemy);
  State.totalEnemiesThisWave++;
  State.spawnedThisWave++;
}

function spawnEnemyAtPosition(kind, x, y, segIdx, segT, pathIndex) {
  // 不计入波次总数（裂变 / 召唤的副产物）
  State.enemies.push(makeEnemy(kind, x, y, segIdx || 0, segT || 0, pathIndex || 0));
}

function damageEnemy(e, dmg, srcKind, options = {}) {
  const def = ENEMIES[e.kind];
  const src = srcKind ? TOWERS[srcKind] : null;
  // 癌细胞物理抗性：非 NK/T 伤害减半
  if (def.physResist && src && !src.antiCancer) {
    dmg *= def.physResist;
  }
  // BOSS 阶段3 减伤
  if (e.bossEnraged && def.boss?.enrage) dmg *= (1 - (def.boss.enrage.damageReduction || 0));

  // 护甲机制
  if (e.armor > 0) {
    const absorbed = Math.min(e.armor, dmg);
    e.armor -= absorbed;
    dmg -= absorbed;
    if (!options.noParticles) spawnHitParticles(e.x, e.y, '#bbbbbb');
  }
  if (dmg > 0) {
    e.hp -= dmg;
    if (!options.noParticles) spawnHitParticles(e.x, e.y, def.color);
  }
  e.flash = 0.12;
  if (e.hp <= 0 && !e.dead) {
    e.dead = true;
    onEnemyKilled(e);
  } else {
    if (!options.silent) SFX.hit();
  }
}

function onEnemyKilled(e) {
  const def = ENEMIES[e.kind];
  unlockCodexEnemy(e.kind);
  const reward = e.reward ?? def.reward;
  State.o2 += reward;
  State.killedThisWave++;
  pushFloater(e.x, e.y - 16, `+${reward} O₂`, '#00f5ff');
  spawnDeathBurst(e.x, e.y, def.color);
  State.shake = Math.max(State.shake, 4);
  SFX.kill();

  // 癌细胞裂变
  if (def.splitOnDeath && Math.random() < def.splitOnDeath.chance) {
    for (let i = 0; i < def.splitOnDeath.count; i++) {
      spawnEnemyAtPosition(def.splitOnDeath.kind, e.x, e.y, e.segIdx, e.segT, e.pathIndex);
    }
    pushFloater(e.x, e.y - 28, '裂变!', '#5fff8f');
  }
  // BOSS 死亡特殊处理（split 自爆不算最终胜利）
  if (def.boss && !e._splitDeath) {
    pushFloater(W / 2, H / 2, `🏆 击败${def.displayName || '超级病原体'}！`, '#ffd60a');
    State.shake = 30;
  }

  if (def.deathExplode) {
    spawnExplosion(e.x, e.y, def.deathExplode.dmgRadius);
    SFX.explode();
    // damage nearby player towers? per design.md it's about damaging nearby allies (towers)
    for (const tw of State.towers) {
      const d = Math.hypot(tw.x - e.x, tw.y - e.y);
      if (d <= def.deathExplode.dmgRadius) {
        // simple penalty: refund-less destroy; design says 'damage' but towers don't have HP — convert into HP penalty on heart for simplicity
        State.heartHP -= 5;
        pushFloater(tw.x, tw.y - 18, '-5 HP', '#ff3b6b');
        // remove tower
        tw._destroyed = true;
      }
    }
    State.towers = State.towers.filter(t => !t._destroyed);
    State.shake = 12;
  }
}

function makeUpgradeState() {

function getTowerCost(kind) {

// ===== Phase L · 玩家操作扩展 (shovel helpers) =====
function enterShovelMode() {

  State.shovelMode = true;

function refundTower(tw) {

  State.o2 += refund;
  pushFloater(tw.x, tw.y - 18, `+${refund} O₂`, '#5fff8f');

}

function getRedBloodOxygenPerSec() {
  return TOWERS.red_blood.oxygenPerSec + (State.upgradeState?.redBloodOxygenAdd || 0);
}

function getMacrophageKillBonus() {
  return TOWERS.macrophage.killBonus + (State.upgradeState?.macrophageKillBonusAdd || 0);
}

function getBSlowDur() {
  return (TOWERS.b_cell.bullet.slowDur || 0) + (State.upgradeState?.bSlowDurAdd || 0);
}

function chooseWaveEvent(wave, waveIndex) {
  if (wave.spawns.some(g => g.type === 'boss')) return null;
  if (waveIndex === 0) return null;
  const nonBossTypes = wave.spawns.map(g => g.type).filter(type => type !== 'boss');
  if (!nonBossTypes.length) return null;
  if (Math.random() < 0.5) {
    const preferred = nonBossTypes.includes('virus') ? 'virus' : (nonBossTypes.includes('bacteria') ? 'bacteria' : nonBossTypes[0]);
    const totalTime = wave.spawns.reduce((acc, group) => acc + group.count * group.interval, 0);
    return {
      ...WAVE_EVENT_POOL.surge,
      triggerAt: Math.max(1.8, totalTime * 0.45),
      surgeType: preferred,
      surgeCount: Math.min(12, 6 + waveIndex * 2),
      surgeInterval: preferred === 'virus' ? 0.16 : 0.2,
      triggered: false,
    };
  }
  const preferredKinds = ['pneumo', 'cancer', 'strep', 'staph', 'virus', 'bacteria'];
  const targetKind = preferredKinds.find(kind => nonBossTypes.includes(kind)) || nonBossTypes[0];
  return {
    ...WAVE_EVENT_POOL.mutant,
    mutantKind: targetKind,
    hpMul: 1.8,
    speedMul: 1.12,
    rewardMul: 1.8,
    armorMul: 1.5,
    triggered: true,
  };
}

function triggerWaveEvent() {
  const ev = State.activeWaveEvent;
  if (!ev || State.waveEventTriggered) return;
  State.waveEventTriggered = true;
  ev.triggered = true;
  if (ev.id === 'surge') {
    for (let i = 0; i < ev.surgeCount; i++) {
      State.waveSpawnQueue.push({ at: State.waveTimer + i * ev.surgeInterval, type: ev.surgeType });
    }
    State.waveSpawnQueue.sort((a, b) => a.at - b.at);
    pushFloater(W / 2, H / 2 - 10, '⚠ 病原潮来袭!', ev.color);
    State.shake = Math.max(State.shake, 12);
  }
}

function getActiveUpgradesPool() {
  const owned = new Set(State.activeUpgrades.map(x => x.id));
  return UPGRADE_POOL.filter(up => !owned.has(up.id));
}

function pickUpgradeChoices(count = 2) {
  const pool = getActiveUpgradesPool().slice();
  const picks = [];
  while (pool.length && picks.length < count) {
    const idx = Math.random() * pool.length | 0;
    picks.push(pool.splice(idx, 1)[0]);
  }
  return picks;
}

function renderUpgradeChoices() {
  const grid = document.getElementById('upgrade-grid');
  grid.innerHTML = '';
  for (const up of State.pendingUpgradeChoices) {
    const btn = document.createElement('button');
    btn.className = 'upgrade-card';
    btn.innerHTML = `
      <span class="tag">${up.tag}</span>
      <h4>${up.name}</h4>
      <p>${up.desc}</p>
    `;
    btn.addEventListener('click', () => chooseUpgrade(up.id));
    grid.appendChild(btn);
  }
}

function renderBuffList() {
  const wrap = document.getElementById('buff-list');
  if (!State.activeUpgrades.length) {
    wrap.innerHTML = '<div class="buff-empty">本局还没有拿到强化。每波结束后会出现二选一奖励。</div>';
    return;
  }
  wrap.innerHTML = State.activeUpgrades.map(up => `
    <div class="buff-item">
      <div class="name">${up.name}</div>
      <div class="desc">${up.desc}</div>
    </div>
  `).join('');
}

function openUpgradeOverlay() {
  State.awaitingUpgrade = true;
  renderUpgradeChoices();
  document.getElementById('overlay-upgrade').classList.remove('hidden');
  updateWaveButtonUI();
}

function closeUpgradeOverlay() {
  State.awaitingUpgrade = false;
  document.getElementById('overlay-upgrade').classList.add('hidden');
  updateWaveButtonUI();
}

function presentUpgradeChoice() {
  State.pendingUpgradeChoices = pickUpgradeChoices(2);
  if (!State.pendingUpgradeChoices.length) {
    scheduleNextWave(WAVE_INTERVAL);
    return;
  }
  openUpgradeOverlay();
}

function chooseUpgrade(id) {
  const picked = State.pendingUpgradeChoices.find(up => up.id === id);
  if (!picked) return;
  State.activeUpgrades.push(picked);
  picked.apply(State.upgradeState);
  renderBuffList();
  closeUpgradeOverlay();
  State.pendingUpgradeChoices = [];
  buildTowerList();
  pushFloater(W / 2, H / 2 - 20, `🧬 ${picked.name}`, '#ffd60a');
  SFX.waveClear();
  scheduleNextWave(WAVE_INTERVAL);
}

function triggerBossPhaseBreak(phase) {
  const rewards = {
    2: { o2: 80, title: 'BOSS 阶段二', lead: '感染扩散中 · 双技能已刷新并获得 80 O₂' },
    3: { o2: 120, title: 'BOSS 最终阶段', lead: '狂暴冲刺中 · 双技能已刷新并获得 120 O₂' },
  };
  const reward = rewards[phase];
  if (!reward) return;
  State.o2 += reward.o2;
  State.feverCooldown = 0;
  State.surgeCooldown = 0;
  State.bossPhaseBannerTimer = 3.2;
  State.bossPhaseBannerTitle = reward.title;
  State.bossPhaseBannerLead = reward.lead;
  State.shake = Math.max(State.shake, 18);
  pushFloater(W / 2, H / 2 - 18, `+${reward.o2} O₂`, '#ffd60a');
  pushFloater(W / 2, H / 2 + 12, '技能已刷新!', '#00f5ff');
  for (let i = 0; i < 24; i++) {
    const a = (i / 24) * Math.PI * 2;
    State.particles.push({
      x: W / 2, y: H / 2,
      vx: Math.cos(a) * (140 + Math.random() * 120),
      vy: Math.sin(a) * (140 + Math.random() * 120),
      r: 3 + Math.random() * 3,
      color: phase === 2 ? '#a855ff' : '#ff3b6b',
      life: 0.55 + Math.random() * 0.2,
      max: 0.75,
      gravity: 0,
    });
  }
}

function canNkMarkTarget(e) {
  return e.kind === 'virus' || e.kind === 'cancer' || e.kind === 'cancer_small' || e.kind === 'boss' || e.kind === 'mega_cancer' || e.kind === 'mega_cancer_child';
}

function applyNkMark(e) {
  e.markTimer = NK_MARK_DURATION;
}

function computeShotResult(srcKind, target) {
  const tower = TOWERS[srcKind];
  let dmg = tower.dmg;
  let crit = false;
  let consumeMark = false;
  let applyMark = false;

  if (tower.eliteBonus && (target.elite || ENEMIES[target.kind].elite)) {
    dmg *= tower.eliteBonus;
    crit = true;
  }
  if (srcKind === 'nk' && canNkMarkTarget(target)) {
    applyMark = true;
  }
  if (srcKind === 't_cell' && target.markTimer > 0) {
    dmg *= (tower.markedBonus || 2) + (State.upgradeState?.tMarkedBonusMul || 0);
    crit = true;
    consumeMark = true;
  }

  return { dmg, crit, consumeMark, applyMark };
}

function castFever() {

function castSurge() {
