// ===== Phase M · 身体状态系统 (body state + antibiotic) =====
function getTowerAttackSpeedMul() {
  let m = 1;
  if (State.surgeActive) m *= SURGE_ATTACK_SPEED_MUL;
  if (State.bodyState && State.bodyState.attackSpeedMul) m *= State.bodyState.attackSpeedMul;
  return m;
}
function getRedBloodOxygenDelta() {
  return State.bodyState && State.bodyState.redBloodO2Delta ? State.bodyState.redBloodO2Delta : 0;
}
function triggerBodyState(stateId) {
  const def = BODY_STATES[stateId];
  if (!def) return;
  State.bodyState = def;
  State.bodyStateTimer = BODY_STATE_DURATION;
  State.bodyStateTriggered = true;
  pushFloater(W / 2, 60, `${def.icon} ${def.name} · ${def.desc}`, def.color);
  State.shake = Math.max(State.shake, 6);
  // 喝酒：削顶塔最大 HP（已掉血会被立刻削顶）
  if (def.maxHpMul) {
    for (const tw of State.towers) {
      tw.maxHp = Math.max(10, Math.floor((tw.maxHp || TOWERS[tw.kind].maxHp || 100) * def.maxHpMul));
      if (tw.hp > tw.maxHp) {
        tw.hp = tw.maxHp;
        tw.flash = 0.12;
      }
    }
  }
}
function endBodyState() {
  const prev = State.bodyState;
  State.bodyState = null;
  State.bodyStateTimer = 0;
  // 喝酒结束后恢复塔的 maxHp 上限，不补血
  if (prev && prev.maxHpMul) {
    for (const tw of State.towers) {
      const baseMax = TOWERS[tw.kind].maxHp || 100;
      tw.maxHp = baseMax;
    }
  }
  if (prev) pushFloater(W / 2, 60, `✓ ${prev.name} 结束`, '#5fff8f');
}
function maybeTriggerBodyState(dt) {
  if (!State.level || State.level.id === 'L1') return;
  if (State.bodyStateTriggered) return;
  if (State.bodyState) return;
  if (State.scene !== 'playing') return;
  if (!State.waveActive) return;
  if (State.bodyStateScheduleTimer === Infinity) return;
  State.bodyStateScheduleTimer -= dt;
  if (State.bodyStateScheduleTimer <= 0) {
    const keys = Object.keys(BODY_STATES);
    const pick = keys[(Math.random() * keys.length) | 0];
    triggerBodyState(pick);
  }
}

function castAntibiotic() {
  if (State.scene !== 'playing') return;
  if (State.antibioticActive || State.antibioticCooldown > 0) return;
  State.antibioticActive = true;
  State.antibioticTimer = ANTIBIOTIC_DURATION;
  State.antibioticCooldown = ANTIBIOTIC_COOLDOWN;
  State.shake = Math.max(State.shake, 6);
  pushFloater(W / 2, 160, '💊 抗生素生效', '#9bf3ff');
  // 全屏淡蓝色波纹
  for (let i = 0; i < 3; i++) {
    State.particles.push({
      x: W / 2, y: H / 2, r: 30 + i * 20, targetR: Math.max(W, H),
      isExpandingRing: true,
      color: 'rgba(155, 243, 255, 0.45)',
      life: 0.7, max: 0.7,
    });
  }
  // 病毒类反向科普飘字
  for (const e of State.enemies) {
    if (e.dead) continue;
    if (!ANTIBIOTIC_TARGET_KINDS.includes(e.kind)) {
      pushFloater(e.x, e.y - (ENEMIES[e.kind].radius || 14) - 14, '无效', '#ff90c8');
    }
  }
  SFX.surge();
}
function updateAntibiotic(dt) {
  if (State.antibioticCooldown > 0) State.antibioticCooldown = Math.max(0, State.antibioticCooldown - dt);
  if (!State.antibioticActive) return;
  State.antibioticTimer -= dt;
  for (const e of State.enemies) {
    if (e.dead) continue;
    if (!ANTIBIOTIC_TARGET_KINDS.includes(e.kind)) continue;
    const dmg = e.hp * ANTIBIOTIC_DPS_PCT * dt;
    damageEnemy(e, dmg, null, { silent: true, noParticles: true });
    if (Math.random() < dt * 4 && !e.dead) {
      State.particles.push({
        x: e.x + (Math.random() - 0.5) * 14,
        y: e.y + (Math.random() - 0.5) * 14,
        vx: (Math.random() - 0.5) * 30, vy: -30 - Math.random() * 10,
        r: 2 + Math.random() * 1.5,
        color: 'rgba(155, 243, 255, 0.7)',
        life: 0.28, max: 0.4, gravity: 0,
      });
    }
  }
  if (State.antibioticTimer <= 0) {
    State.antibioticActive = false;
    State.antibioticTimer = 0;
    pushFloater(W / 2, 160, '抗生素结束', '#9bf3ff');
  }
}

/* =======================================================================
 *  COMBAT
 * ======================================================================= */
function findAoeTargets(tw) {
  const def = TOWERS[tw.kind];
  const r = def.range * TILE;
  const hits = [];
  for (const e of State.enemies) {
    if (e.dead) continue;
    if (Math.hypot(e.x - tw.x, e.y - tw.y) <= r) hits.push(e);
  }
  return hits;
}

function performAoe(tw, hits) {
  const def = TOWERS[tw.kind];
  // 视觉：扩张光圈
  State.particles.push({
    x: tw.x, y: tw.y, vx: 0, vy: 0,
    r: 6, color: 'rgba(163, 97, 74, 0.55)',
    life: 0.45, max: 0.45,
    isExpandingRing: true, targetR: def.aoeRadius * TILE,
  });
  let bonus = 0;
  for (const e of hits) {
    const wasAlive = !e.dead;
    damageEnemy(e, def.dmg, tw.kind);
    if (wasAlive && e.dead && def.killBonus) bonus += getMacrophageKillBonus();
  }
  if (bonus > 0) {
    State.o2 += bonus;
    pushFloater(tw.x, tw.y - 24, `吞噬 +${bonus} O₂`, '#ffd60a');
  }
  SFX.kill();
}

function findTarget(tw) {
  const def = TOWERS[tw.kind];
  // 嘲讽优先：场上有 tauntActive 的敌人 + 在范围内时强制选他
  let taunter = null, taunterProgress = -1;
  for (const e of State.enemies) {
    if (e.dead || !(e.tauntActive > 0)) continue;
    const d = Math.hypot(e.x - tw.x, e.y - tw.y);
    if (d > def.range * TILE) continue;
    const p = e.segIdx + e.segT;
    if (p > taunterProgress) { taunterProgress = p; taunter = e; }
  }
  if (taunter) return taunter;

  if (tw.kind === 't_cell') {
    let marked = null, markedProgress = -1;
    for (const e of State.enemies) {
      if (e.dead || !(e.markTimer > 0)) continue;
      const d = Math.hypot(e.x - tw.x, e.y - tw.y);
      if (d > def.range * TILE) continue;
      const progress = e.segIdx + e.segT;
      if (progress > markedProgress) { markedProgress = progress; marked = e; }
    }
    if (marked) return marked;
  }

  if (tw.kind === 'nk') {
    let bestMarkable = null, bestMarkableProgress = -1;
    for (const e of State.enemies) {
      if (e.dead || !canNkMarkTarget(e) || e.markTimer > 0) continue;
      const d = Math.hypot(e.x - tw.x, e.y - tw.y);
      if (d > def.range * TILE) continue;
      const progress = e.segIdx + e.segT;
      if (progress > bestMarkableProgress) { bestMarkableProgress = progress; bestMarkable = e; }
    }
    if (bestMarkable) return bestMarkable;
  }

  let best = null, bestProgress = -1;
  for (const e of State.enemies) {
    if (e.dead) continue;
    const d = Math.hypot(e.x - tw.x, e.y - tw.y);
    if (d > def.range * TILE) continue;
    const progress = e.segIdx + e.segT;
    if (progress > bestProgress) { bestProgress = progress; best = e; }
  }
  return best;
}

function fireBullet(tw, target) {
  const def = TOWERS[tw.kind];
  State.bullets.push({
    x: tw.x, y: tw.y,
    target,
    speed: def.bullet.speed,
    def: def.bullet,
    trail: [],
    srcKind: tw.kind,
  });
  if (tw.kind === 'nk') SFX.shootNK(); else SFX.shoot();
}

function updateBullet(b, dt) {
  if (!b.target || b.target.dead) {
    // continue toward last position briefly then die
    b._dead = true;
    return;
  }
  const dx = b.target.x - b.x;
  const dy = b.target.y - b.y;
  const d = Math.hypot(dx, dy);
  const move = b.speed * dt;
  if (move >= d) {
    b.x = b.target.x; b.y = b.target.y;
    // B 细胞抗体减速：取最强减速 + 续航
    if (b.def.slowFactor && b.target.hp > 0) {
      const newF = Math.min(b.target.slowFactor || 1, b.def.slowFactor);
      b.target.slowFactor = newF;
      b.target.slowTimer = Math.max(b.target.slowTimer || 0, getBSlowDur());
    }
    const shot = computeShotResult(b.srcKind, b.target);
    if (shot.applyMark && b.target.hp > 0) {
      applyNkMark(b.target);
      pushFloater(b.target.x, b.target.y - 28, '标记!', '#ffd60a');
    }
    if (shot.crit) {
      pushFloater(b.target.x, b.target.y - 16, '暴击!', '#ffd60a');
      State.shake = Math.max(State.shake, 8);
    }
    if (shot.consumeMark && b.target.markTimer > 0) {
      b.target.markTimer = 0;
      pushFloater(b.target.x, b.target.y - 40, '清除!', '#4d8cff');
      State.shake = Math.max(State.shake, 12);
    }
    damageEnemy(b.target, shot.dmg, b.srcKind);
    b._dead = true;
    return;
  }
  b.x += (dx / d) * move;
  b.y += (dy / d) * move;
  b.trail.push({ x: b.x, y: b.y });
  if (b.trail.length > 8) b.trail.shift();
}

/* =======================================================================
 *  WAVE SYSTEM
 * ======================================================================= */
const WAVE_INTRO_DELAY = 5;     // 进入关卡到第一波的倒计时
const WAVE_INTERVAL = 9;        // 每波之间的缓冲倒计时

function scheduleNextWave(seconds) {
  State.waveCountdown = seconds;
  State.waveCountdownMax = seconds;
  updateWaveButtonUI();
}

function startWave() {
  if (State.awaitingUpgrade) return;
  if (State.waveActive) return;
  if (State.waveIndex >= State.level.waves.length) return;
  const wave = State.level.waves[State.waveIndex];
  State.activeWaveEvent = chooseWaveEvent(wave, State.waveIndex);
  State.waveEventTriggered = !State.activeWaveEvent || State.activeWaveEvent.id === 'mutant';
  State.pendingMutantKind = State.activeWaveEvent?.id === 'mutant' ? State.activeWaveEvent.mutantKind : null;
  State.pendingMutantCount = State.activeWaveEvent?.id === 'mutant' ? 1 : 0;
  State.waveActive = true;
  State.waveCountdown = 0;
  State.spawnedThisWave = 0;
  State.killedThisWave = 0;
  State.totalEnemiesThisWave = 0;
  State.waveSpawnQueue = [];
  let t = 0;
  // ===== Phase N.3 · 多路径关卡: 按 spawn 顺序轮询所有路径 =====
  const pathCount = State.pathsPoints ? State.pathsPoints.length : 1;
  let spawnSeq = 0;
  for (const group of wave.spawns) {
    for (let i = 0; i < group.count; i++) {
      const pi = (group.pathIndex != null) ? group.pathIndex : (spawnSeq % pathCount);
      State.waveSpawnQueue.push({ at: t, type: group.type, pathIndex: pi });
      t += group.interval;
      spawnSeq++;
    }
  }
  State.waveTimer = 0;
  // big "WAVE N" announcement
  pushFloater(W / 2, H / 2 - 40, `🌊 第 ${State.waveIndex + 1} 波 来袭！`, '#ff2ec0');
  if (State.activeWaveEvent) pushFloater(W / 2, H / 2 - 72, `⚠ ${State.activeWaveEvent.name}`, State.activeWaveEvent.color);
  State.shake = Math.max(State.shake, 8);
  SFX.waveStart();
  updateWaveButtonUI();
}

function updateWaveCountdown(dt) {
  if (State.waveActive) return;
  if (State.waveCountdown <= 0) return;
  const prevSec = Math.ceil(State.waveCountdown);
  State.waveCountdown -= dt;
  if (State.waveCountdown <= 0) {
    State.waveCountdown = 0;
    startWave();
  } else {
    const newSec = Math.ceil(State.waveCountdown);
    if (newSec !== prevSec && newSec <= 3 && newSec > 0) SFX.tick();
    updateWaveButtonUI();
  }
}

function updateWaveSpawns(dt) {
  if (!State.waveActive) return;
  State.waveTimer += dt;
  if (State.activeWaveEvent && State.activeWaveEvent.id === 'surge' && !State.waveEventTriggered && State.waveTimer >= State.activeWaveEvent.triggerAt) {
    triggerWaveEvent();
  }
  while (State.waveSpawnQueue.length && State.waveSpawnQueue[0].at <= State.waveTimer) {
    const s = State.waveSpawnQueue.shift();
    spawnEnemy(s.type, s.pathIndex);
  }
  if (State.waveSpawnQueue.length === 0 && State.enemies.every(e => e.dead)) {
    onWaveCleared();
  }
}

function onWaveCleared() {
  State.waveActive = false;
  State.enemies = [];
  State.activeWaveEvent = null;
  State.waveEventTriggered = false;
  State.pendingMutantKind = null;
  State.pendingMutantCount = 0;
  State.waveIndex++;
  if (State.waveIndex >= State.level.waves.length) {
    setScene('won');
  } else {
    pushFloater(W / 2, H / 2, `✨ 波次 ${State.waveIndex} 清空！`, '#5fff8f');
    presentUpgradeChoice();
  }
}

function updateWaveButtonUI() {
  const btn = document.getElementById('btn-wave');
  if (!btn) return;
  if (State.awaitingUpgrade) {
    btn.textContent = '🧬 先选强化';
    btn.disabled = true;
  } else if (State.waveActive) {
    btn.textContent = '⚔ 战斗中';
    btn.disabled = true;
  } else if (State.waveIndex >= (State.level ? State.level.waves.length : 0)) {
    btn.textContent = '✓ 已通关';
    btn.disabled = true;
  } else if (State.waveCountdown > 0) {
    btn.textContent = `⚡ 立即来袭（${Math.ceil(State.waveCountdown)}s）`;
    btn.disabled = false;
  } else {
    btn.textContent = '▶ 开始波次';
    btn.disabled = false;
  }
}

/* =======================================================================
 *  GAME LOOP
 * ======================================================================= */
let lastTime = 0;
function loop(now) {
  const realDt = Math.min(0.05, (now - lastTime) / 1000 || 0);
  lastTime = now;
  const dt = realDt;

  if (State.scene === 'playing') {
    update(dt);
  }
  render(now / 1000);
  requestAnimationFrame(loop);
}

function update(dt) {
  // O2 generation: base + producers
  let perSec = 5;
  for (const tw of State.towers) {
    if (tw.kind === 'red_blood') perSec += Math.max(0, getRedBloodOxygenPerSec() + getRedBloodOxygenDelta()) + getRedBloodEnvironmentBonus(tw);
    else if (TOWERS[tw.kind].oxygenPerSec) perSec += TOWERS[tw.kind].oxygenPerSec;
  }
  State.o2Accum += perSec * dt;
  if (State.o2Accum >= 1) {
    const add = Math.floor(State.o2Accum);
    State.o2 += add;
    State.o2Accum -= add;
  }

  // wave / spawning
  updateWaveCountdown(dt);
  updateWaveSpawns(dt);

  // BOSS 感染倒计时
  if (State.bossInfectActive) {
    State.bossInfectTimer -= dt;
    if (State.bossInfectTimer <= 0) {
      State.bossInfectActive = false;
      pushFloater(W / 2, H / 2, '✓ 感染解除', '#5fff8f');
    }
  }
  if (State.feverCooldown > 0) State.feverCooldown = Math.max(0, State.feverCooldown - dt);
  if (State.feverActive) {
    State.feverTimer -= dt;
    if (State.feverTimer <= 0) {
      State.feverActive = false;
      State.feverTimer = 0;
      pushFloater(W / 2, 92, '体温回落', '#ffd87a');
    }
  }
  if (State.surgeCooldown > 0) State.surgeCooldown = Math.max(0, State.surgeCooldown - dt);
  if (State.surgeActive) {
    State.surgeTimer -= dt;
    if (State.surgeTimer <= 0) {
      State.surgeActive = false;
      State.surgeTimer = 0;
      pushFloater(W / 2, 126, '免疫增援结束', '#9bf3ff');
    }
  }
  // ===== Phase M · 身体状态系统 (body state + antibiotic tick) =====
  maybeTriggerBodyState(dt);
  if (State.bodyState) {
    State.bodyStateTimer -= dt;
    if (State.bodyStateTimer <= 0) endBodyState();
  }
  updateAntibiotic(dt);
  if (State.level?.id === 'L3' && State.levelEnv?.zones?.length) {
    State.gutFloraShiftTimer -= dt;
    if (State.gutFloraShiftTimer <= 0) advanceGutFloraZone();
  }
  // ===== Phase N.1 · L7 唾液冲刷波 =====
  if (State.level?.id === 'L7' && State.levelEnv) updateSalivaWaves(dt);
  if (State.levelEnvNoticeTimer > 0) State.levelEnvNoticeTimer = Math.max(0, State.levelEnvNoticeTimer - dt);
  if (State.bossPhaseBannerTimer > 0) State.bossPhaseBannerTimer = Math.max(0, State.bossPhaseBannerTimer - dt);

  // tower combat
  for (const tw of State.towers) {
    // ===== Phase K · 双向战斗 + 塔有生命 (flash decay) =====
    if (tw.flash > 0) tw.flash = Math.max(0, tw.flash - dt);
    if (State.bossInfectActive) break; // 阶段2 期间所有塔停止攻击
    const def = TOWERS[tw.kind];
    // ===== Phase M · 身体状态系统 (attack speed) =====
    const towerDt = dt * getTowerAttackSpeedMul();
    if (def.role === 'attacker') {
      tw.cd -= towerDt;
      if (tw.cd <= 0) {
        const target = findTarget(tw);
        if (target) {
          fireBullet(tw, target);
          tw.cd = def.cooldown;
        } else {
          tw.cd = 0;
        }
      }
    } else if (def.role === 'aoe') {
      tw.cd -= towerDt;
      if (tw.cd <= 0) {
        const hits = findAoeTargets(tw);
        if (hits.length > 0) {
          performAoe(tw, hits);
          tw.cd = def.cooldown;
        } else {
          tw.cd = 0;
        }
      }
    }
  }

  // enemies
  for (const e of State.enemies) {
    if (e.dead) continue;
    if (e.flash > 0) e.flash -= dt;
    if (e.markTimer > 0) e.markTimer = Math.max(0, e.markTimer - dt);
    // ===== Phase L · 玩家操作扩展 (name card decay) =====
    if (e.nameCardTimer > 0) e.nameCardTimer = Math.max(0, e.nameCardTimer - dt);
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      if (e.slowTimer <= 0) e.slowFactor = 1;
    }
    // 嘲讽推进
    const def = ENEMIES[e.kind];
    if (def.taunt) {
      if (e.tauntActive > 0) {
        e.tauntActive -= dt;
        if (e.tauntActive <= 0) e.tauntCooldown = def.taunt.interval;
      } else {
        e.tauntCooldown -= dt;
        if (e.tauntCooldown <= 0) {
          e.tauntActive = def.taunt.duration;
          pushFloater(e.x, e.y - def.radius - 18, '嘲讽全场!', '#ffd60a');
        }
      }
    }
    // 癌细胞回血
    if (def.regen) {
      e.regenTimer -= dt;
      if (e.regenTimer <= 0) {
        e.regenTimer = def.regen.interval;
        if (e.hp < def.hp) {
          e.hp = Math.min(def.hp, e.hp + def.regen.amount);
          pushFloater(e.x, e.y - def.radius - 6, `+${def.regen.amount}`, '#5fff8f');
        }
      }
    }
    if (State.level?.id === 'L3' && isEnemyInGutFloraZone(e)) {
      damageEnemy(e, State.levelEnv.damagePerSec * dt, null, { silent: true, noParticles: true });
      if (!e.dead && Math.random() < dt * 3) {
        State.particles.push({
          x: e.x + (Math.random() - 0.5) * 12,
          y: e.y + (Math.random() - 0.5) * 12,
          vx: (Math.random() - 0.5) * 20,
          vy: -20 - Math.random() * 10,
          r: 2 + Math.random() * 1.5,
          color: 'rgba(255, 207, 138, 0.55)',
          life: 0.28 + Math.random() * 0.1,
          max: 0.38,
          gravity: 0,
        });
      }
    }
    // BOSS 阶段
    if (def.boss) {
      // ===== Phase N.3 · L9 BOSS 分裂逻辑（HP < split.hpPct 时分裂出子体并自爆）=====
      if (def.boss.split && !e.bossSplitDone && e.hp / def.hp <= def.boss.split.hpPct) {
        e.bossSplitDone = true;
        triggerBossPhaseBreak(2);
        pushFloater(W / 2, H / 2, '⚠️ 超级癌变群分裂！', '#7be3a7');
        State.shake = 22;
        for (let i = 0; i < def.boss.split.count; i++) {
          const offX = (i === 0 ? -1 : 1) * 26;
          spawnEnemyAtPosition(def.boss.split.kind, e.x + offX, e.y + (Math.random() - 0.5) * 18, e.segIdx, e.segT, e.pathIndex);
        }
        // 母体死亡（不再保留，子体接管）；标记 _splitDeath 跳过 BOSS 胜利文案
        e.hp = 0;
        e.dead = true;
        e._splitDeath = true;
        onEnemyKilled(e);
        spawnDeathBurst(e.x, e.y, '#7be3a7');
      }
      // L6 三阶段（仅当 def.boss.infect / enrage 存在时）
      if (def.boss.infect || def.boss.enrage) {
        const hpPct = e.hp / def.hp;
        const newPhase = hpPct > 0.6 ? 1 : (hpPct > 0.3 ? 2 : 3);
        if (newPhase !== e.bossPhase) {
          e.bossPhase = newPhase;
          if (newPhase === 2 && def.boss.infect) {
            triggerBossPhaseBreak(2);
            State.bossInfectActive = true;
            State.bossInfectTimer = def.boss.infect.duration;
            pushFloater(W / 2, H / 2, '⚠️ 路径感染！塔被禁用 5 秒', '#ff3b6b');
            State.shake = 18;
          } else if (newPhase === 3 && def.boss.enrage) {
            triggerBossPhaseBreak(3);
            e.bossEnraged = true;
            pushFloater(W / 2, H / 2, '💀 狂暴！加速 + 减伤', '#ff2ec0');
            State.shake = 18;
          }
        }
      }
      // 阶段1 召唤 (Boss with summon — 不区分阶段，按 interval 触发；如有 infect/enrage 才限阶段1)
      if (def.boss.summon && (!def.boss.infect || e.bossPhase === 1) && !e.dead) {
        e.bossSummonTimer -= dt;
        if (e.bossSummonTimer <= 0) {
          e.bossSummonTimer = def.boss.summon.interval;
          for (let i = 0; i < def.boss.summon.count; i++) {
            spawnEnemyAtPosition(def.boss.summon.kind, e.x + (Math.random() - 0.5) * 20, e.y + (Math.random() - 0.5) * 20, e.segIdx, e.segT, e.pathIndex);
          }
          pushFloater(e.x, e.y - def.radius - 14, '召唤护卫!', '#ff2ec0');
        }
      }
    }
    // ===== Phase K · 双向战斗 + 塔有生命 (enemy melee) =====
    if (e.meleeCdTimer > 0) e.meleeCdTimer = Math.max(0, e.meleeCdTimer - dt);
    if (e.meleeLunge > 0) e.meleeLunge = Math.max(0, e.meleeLunge - dt);
    let __meleeEngaged = false;
    if (def.meleeDmg && State.towers.length) {
      const rangePx = def.meleeRange * TILE + def.radius;
      let __target = null, __td = Infinity;
      for (const tw of State.towers) {
        const d = Math.hypot(tw.x - e.x, tw.y - e.y);
        if (d <= rangePx && d < __td) { __td = d; __target = tw; }
      }
      if (__target) {
        __meleeEngaged = true;
        if (e.meleeCdTimer <= 0) {
          __target.hp -= def.meleeDmg;
          __target.flash = 0.08;
          e.meleeCdTimer = def.meleeCd;
          e.meleeLunge = 0.1;
          e.meleeLungeX = __target.x;
          e.meleeLungeY = __target.y;
          // 红色冲击粒子
          for (let i = 0; i < 6; i++) {
            const ang = Math.random() * Math.PI * 2;
            const sp = 80 + Math.random() * 100;
            State.particles.push({
              x: __target.x, y: __target.y,
              vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
              r: 2 + Math.random() * 2,
              color: '#ff3b6b',
              life: 0.32, max: 0.32, gravity: 120,
            });
          }
          SFX.hpHurt();
          if (__target.hp <= 0 && !__target._destroyed) {
            __target._destroyed = true;
            spawnDeathBurst(__target.x, __target.y, TOWERS[__target.kind].color);
            pushFloater(__target.x, __target.y - 18, '细胞凋亡', '#ff3b6b');
            State.shake = Math.max(State.shake, 8);
          }
        }
      }
    }
    const reachedHeart = __meleeEngaged ? false : moveAlongPath(e, dt);
    if (reachedHeart) {
      e.dead = true;
      State.heartHP -= 10;
      State.shake = Math.max(State.shake, 10);
      pushFloater(e.x, e.y, '-10 HP', '#ff3b6b');
      SFX.hpHurt();
      if (State.heartHP <= 0) {
        State.heartHP = 0;
        setScene('lost');
      }
    }
  }
  State.enemies = State.enemies.filter(e => !e.dead || e.flash > -0.2);
  // (we keep dead briefly is unnecessary since we burst immediately; just drop)
  State.enemies = State.enemies.filter(e => !e.dead);
  // ===== Phase K · 双向战斗 + 塔有生命 (cull dead towers) =====
  if (State.towers.some(tw => tw._destroyed)) {
    State.towers = State.towers.filter(tw => !tw._destroyed);
  }

  // bullets
  for (const b of State.bullets) updateBullet(b, dt);
  State.bullets = State.bullets.filter(b => !b._dead);

  // particles
  for (const p of State.particles) {
    if (p.isRing) {
      p.life -= dt;
      p.r += 220 * dt;
      continue;
    }
    if (p.isExpandingRing) {
      p.life -= dt;
      p.r += (p.targetR - p.r) * Math.min(1, dt * 6);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy = p.vy * 0.92 + (p.gravity || 0) * dt;
    p.life -= dt;
  }
  State.particles = State.particles.filter(p => p.life > 0);

  for (const f of State.floaters) {
    f.life -= dt;
    f.y += f.vy * dt;
    f.vy *= 0.95;
  }
  State.floaters = State.floaters.filter(f => f.life > 0);

  if (State.shake > 0) State.shake = Math.max(0, State.shake - 30 * dt);

  syncHUD();
}

function render(t) {
  ctx.save();
  if (State.shake > 0) {
    const sx = (Math.random() - 0.5) * State.shake;
    const sy = (Math.random() - 0.5) * State.shake;
    ctx.translate(sx, sy);
  }

  clearScreen();
  drawLevelBackground();
  drawAmbientCells(t);
  drawGridHex();

  if (State.scene === 'playing' || State.scene === 'won' || State.scene === 'lost') {
    drawPath(t);
    drawLevelEnvironment(t);
    // draw bullets under towers? draw under is fine; under enemies too
    // draw towers
    for (const tw of State.towers) drawTower(tw, t);
    // draw enemies
    for (const e of State.enemies) drawEnemy(e, t);
    // bullets above
    for (const b of State.bullets) drawBullet(b);
    // particles
    for (const p of State.particles) {
      if (p.isRing || p.isExpandingRing) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / p.max);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
    drawParticles();
    drawFloaters();
    drawHoverPlacement();
    drawWaveCountdownOverlay(t);
    drawWaveEventOverlay(t);
    drawLevelEnvironmentNotice(t);
    drawBossPhaseOverlay(t);
    drawSurgeOverlay(t);
    drawFeverOverlay(t);
    drawBossInfectOverlay(t);
    // ===== Phase M · 身体状态系统 (render hooks) =====
    drawBodyStateOverlay(t);
    drawAntibioticOverlay(t);
  }

  ctx.restore();
}

/* =======================================================================
 *  HUD / INPUT
 * ======================================================================= */
function syncHUD() {
  document.getElementById('stat-o2').textContent = State.o2;
  document.getElementById('stat-hp').textContent = State.heartHP;
  const pct = State.heartHP / State.heartHPMax;
  const bar = document.getElementById('bar-hp');
  bar.style.width = `${pct * 100}%`;
  bar.classList.toggle('warn', pct <= 0.6 && pct > 0.3);
  bar.classList.toggle('crit', pct <= 0.3);
  // heart icon: faster pulse when critical
  document.getElementById('heart-icon').classList.toggle('crit', pct <= 0.3);

  const total = State.level ? State.level.waves.length : 0;
  document.getElementById('stat-wave').textContent = `${State.waveIndex} / ${total}`;
  // refresh tower cards affordability
  document.querySelectorAll('.tower-card').forEach(card => {
    const cost = getTowerCost(card.dataset.key);
    card.dataset.cost = cost;
    const costEl = card.querySelector('.tower-cost');
    if (costEl) costEl.textContent = cost;
    if (State.o2 < cost) card.classList.add('disabled'); else card.classList.remove('disabled');
  });

  const feverBtn = document.getElementById('btn-fever');
  if (feverBtn) {
    if (State.scene !== 'playing') {
      feverBtn.textContent = '🌡 发烧';
      feverBtn.disabled = true;
    } else if (State.feverActive) {
      feverBtn.textContent = `🌡 发烧中 ${Math.ceil(State.feverTimer)}s`;
      feverBtn.disabled = true;
    } else if (State.feverCooldown > 0) {
      feverBtn.textContent = `🌡 冷却 ${Math.ceil(State.feverCooldown)}s`;
      feverBtn.disabled = true;
    } else {
      feverBtn.textContent = '🌡 发烧';
      feverBtn.disabled = false;
    }
  }
  const surgeBtn = document.getElementById('btn-surge');
  if (surgeBtn) {
    if (State.scene !== 'playing') {
      surgeBtn.textContent = '⚡ 免疫增援';
      surgeBtn.disabled = true;
    } else if (State.surgeActive) {
      surgeBtn.textContent = `⚡ 增援中 ${Math.ceil(State.surgeTimer)}s`;
      surgeBtn.disabled = true;
    } else if (State.surgeCooldown > 0) {
      surgeBtn.textContent = `⚡ 冷却 ${Math.ceil(State.surgeCooldown)}s`;
      surgeBtn.disabled = true;
    } else {
      surgeBtn.textContent = '⚡ 免疫增援';
      surgeBtn.disabled = false;
    }
  }
  // ===== Phase M · 身体状态系统 (antibiotic button UI) =====
  const antiBtn = document.getElementById('btn-antibiotic');
  if (antiBtn) {
    if (State.scene !== 'playing') {
      antiBtn.textContent = '💊 抗生素';
      antiBtn.disabled = true;
    } else if (State.antibioticActive) {
      antiBtn.textContent = `💊 抗生素 ${Math.ceil(State.antibioticTimer)}s`;
      antiBtn.disabled = true;
    } else if (State.antibioticCooldown > 0) {
      antiBtn.textContent = `💊 冷却 ${Math.ceil(State.antibioticCooldown)}s`;
      antiBtn.disabled = true;
    } else {
      antiBtn.textContent = '💊 抗生素';
      antiBtn.disabled = false;
    }
  }
}

function buildTowerList() {
  const wrap = document.getElementById('tower-list');
  wrap.innerHTML = '';
  if (!State.level) return;
  for (const key of State.level.unlockedTowers) {
    const def = TOWERS[key];
    const card = document.createElement('div');
    card.className = 'tower-card';
    card.dataset.key = key;
    card.dataset.cost = getTowerCost(key);
    card.innerHTML = `
      <div class="tower-icon" style="background: radial-gradient(circle, ${def.glow}, transparent 70%);">${def.icon}</div>
      <div class="tower-meta">
        <div class="name">${def.name}</div>
        <div class="desc">${def.desc}</div>
      </div>
      <div class="tower-cost">${getTowerCost(key)}</div>
    `;
    card.addEventListener('click', () => {
      if (card.classList.contains('disabled')) return;
      // ===== Phase L · 玩家操作扩展 (selecting tower exits shovel) =====
      if (State.shovelMode) exitShovelMode();
      if (State.selectedTower === key) {
        State.selectedTower = null;
        card.classList.remove('selected');
        canvas.classList.remove('placing');
      } else {
        State.selectedTower = key;
        document.querySelectorAll('.tower-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        canvas.classList.add('placing');
      }
    });
    wrap.appendChild(card);
  }
}

/* ---- Persistence (localStorage) ---- */
function loadWins() {
  try { return JSON.parse(localStorage.getItem('bd_wins') || '{}') || {}; }
  catch { return {}; }
}
function saveWins() {
  try { localStorage.setItem('bd_wins', JSON.stringify(State.wins)); } catch {}
}
function loadCodex() {
  try {
    const raw = JSON.parse(localStorage.getItem('bd_codex') || '{}') || {};
    return {
      enemies: raw.enemies || {},
      organs: raw.organs || {},
    };
  } catch {
    return { enemies: {}, organs: {} };
  }
}
function saveCodex() {
  try { localStorage.setItem('bd_codex', JSON.stringify(State.codex)); } catch {}
}

function unlockCodexEnemy(kind) {
  if (!State.codex || State.codex.enemies[kind]) return false;
  State.codex.enemies[kind] = true;
  saveCodex();
  pushFloater(W / 2, 150, `📘 解锁病原体图鉴：${CODEX_ENEMIES[kind]?.name || kind}`, '#5fff8f');
  return true;
}

function unlockCodexOrgan(levelId) {
  if (!State.codex || State.codex.organs[levelId]) return false;
  State.codex.organs[levelId] = true;
  saveCodex();
  return true;
}

function renderCodexList(targetId, defs, unlockedMap) {
  const wrap = document.getElementById(targetId);
  wrap.innerHTML = Object.entries(defs).map(([id, item]) => {
    const unlocked = !!unlockedMap[id];
    return `
      <div class="codex-card ${unlocked ? '' : 'locked'}">
        <div class="meta">
          <div class="icon">${unlocked ? item.icon : '🔒'}</div>
          <div>
            <div class="title">${unlocked ? item.name : '未解锁'}</div>
            <div class="sub">${unlocked ? item.sub : '继续战斗以解锁'}</div>
          </div>
        </div>
        <p>${unlocked ? item.desc : '首次击败或首次通关后，这条档案会被记录进身体图鉴。'}</p>
      </div>
    `;
  }).join('');
}

function renderCodex() {
  renderCodexList('codex-enemies', CODEX_ENEMIES, State.codex.enemies);
  renderCodexList('codex-organs', CODEX_ORGANS, State.codex.organs);
}

function openCodex() {
  renderCodex();
  const overlay = document.getElementById('overlay-codex');
  overlay.classList.remove('hidden');
}

function closeCodex() {
  document.getElementById('overlay-codex').classList.add('hidden');
}

function levelStars(diff) {
  let html = '';
  for (let i = 0; i < 5; i++) {
    html += `<span class="${i < diff ? '' : 'empty'}">★</span>`;
  }
  return html;
}

function isLevelUnlocked(lv) {
  // 全部关卡始终可玩（不再要求按顺序通关）
  return true;
}

function buildLevelMenu() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  // playable
  LEVELS.forEach(lv => {
    const cleared = !!State.wins[lv.id];
    const unlocked = isLevelUnlocked(lv);
    const card = document.createElement('div');
    card.className = 'level-card' + (unlocked ? '' : ' locked');
    let badgeClass = 'unlocked', badgeText = lv.id;
    if (cleared) { badgeClass = 'cleared'; badgeText = `${lv.id} ✓ 已通关`; }
    else if (!unlocked) { badgeClass = 'locked'; badgeText = `🔒 需通关 ${lv.requires}`; }
    card.innerHTML = `
      <div class="cover">
        ${levelCoverSVG(lv.cover)}
        <span class="badge ${badgeClass}">${badgeText}</span>
        <span class="stars">${levelStars(lv.difficulty)}</span>
      </div>
      <div class="info">
        <h4>${lv.name}</h4>
        <div class="desc">${lv.desc}</div>
        <div class="stats">
          <span>💨 <b>${lv.startO2}</b></span>
          <span>❤️ <b>${lv.heartHP}</b></span>
          <span>🌊 <b>${lv.waves.length}</b></span>
        </div>
      </div>
    `;
    if (unlocked) card.addEventListener('click', () => startLevel(lv));
    grid.appendChild(card);
  });

  // coming soon placeholders
  COMING_SOON.forEach(lv => {
    const card = document.createElement('div');
    card.className = 'level-card coming-soon';
    card.innerHTML = `
      <div class="cover">
        ${levelCoverSVG(lv.cover)}
        <span class="badge soon">${lv.id} · 敬请期待</span>
        <span class="stars">${levelStars(lv.difficulty)}</span>
      </div>
      <div class="info">
        <h4>${lv.name}</h4>
        <div class="desc">${lv.desc}</div>
        <div class="stats"><span style="color: rgba(255,255,255,0.4)">开发中…</span></div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function startLevel(level) {
  State.level = level;
  State.levelEnv = makeLevelEnvironment(level);
  invalidateBgCache();
  State.heartHPMax = level.heartHP;
  State.heartHP = level.heartHP;
  State.o2 = level.startO2;
  State.o2Accum = 0;
  State.waveIndex = 0;
  State.waveActive = false;
  State.towers = [];
  State.enemies = [];
  State.bullets = [];
  State.particles = [];
  State.floaters = [];
  State.shake = 0;
  State.bossInfectActive = false;
  State.bossInfectTimer = 0;
  State.feverActive = false;
  State.feverTimer = 0;
  State.feverCooldown = 0;
  State.surgeActive = false;
  State.surgeTimer = 0;
  State.surgeCooldown = 0;
  State.awaitingUpgrade = false;
  State.pendingUpgradeChoices = [];
  State.activeUpgrades = [];
  State.upgradeState = makeUpgradeState();
  State.activeWaveEvent = null;
  State.waveEventTriggered = false;
  State.pendingMutantKind = null;
  State.pendingMutantCount = 0;
  State.levelEnvNoticeTimer = 0;
  State.levelEnvNoticeText = '';
  State.gutFloraZoneIndex = -1;
  State.gutFloraShiftTimer = 0;
  State.bossPhaseBannerTimer = 0;
  State.bossPhaseBannerTitle = '';
  State.bossPhaseBannerLead = '';
  State.selectedTower = null;
  // ===== Phase L · 玩家操作扩展 (level reset) =====
  exitShovelMode();
  State.enemyNameSeen = new Set();
  // ===== Phase M · 身体状态系统 (level reset) =====
  State.bodyState = null;
  State.bodyStateTimer = 0;
  State.bodyStateTriggered = false;
  // L1 不触发，其他关 12~28s 后随机考虑一次
  State.bodyStateScheduleTimer = (level.id === 'L1') ? Infinity : (12 + Math.random() * 16);
  State.antibioticActive = false;
  State.antibioticTimer = 0;
  State.antibioticCooldown = 0;
  buildPathPoints(level);
  if (State.levelEnv) {
    setHintText(State.levelEnv.hint);
    setLevelEnvironmentNotice(`🧬 地图机制：${State.levelEnv.name}`, 4.4);
    if (level.id === 'L3') advanceGutFloraZone(true);
  } else {
    setHintText('点击下方塔位 → 在地图上点击放置');
  }
  buildTowerList();
  renderBuffList();
  closeUpgradeOverlay();
  setScene('playing');
  scheduleNextWave(WAVE_INTRO_DELAY);
  SFX.init();
  SFX.startBGM(level);
}

function spawnConfetti(count) {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const colors = ['#ff2ec0', '#00f5ff', '#5fff8f', '#ffd60a', '#a855ff', '#ff8a3d'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('i');
    el.style.left = (Math.random() * 100) + '%';
    el.style.background = colors[i % colors.length];
    el.style.animationDuration = (3 + Math.random() * 2.5) + 's';
    el.style.animationDelay = (Math.random() * 1.2) + 's';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(el);
  }
}

function setScene(s) {
  State.scene = s;
  const menuEl = document.getElementById('overlay-menu');
  const resEl = document.getElementById('overlay-result');
  const upgradeEl = document.getElementById('overlay-upgrade');
  const codexEl = document.getElementById('overlay-codex');
  menuEl.classList.add('hidden');
  resEl.classList.add('hidden');
  upgradeEl.classList.add('hidden');
  codexEl.classList.add('hidden');
  resEl.classList.remove('lose');
  if (s === 'menu') {
    menuEl.classList.remove('hidden');
    setHintText('点击下方塔位 → 在地图上点击放置');
    SFX.stopBGM();
  }
  if (s === 'won' || s === 'lost') {
    document.getElementById('result-title').textContent = s === 'won' ? '🏆 胜利！' : '💔 失败';
    document.getElementById('result-lead').textContent = s === 'won'
      ? `${State.level.name} 已通关！所有病原体被歼灭。`
      : '心脏 HP 归零，病原体攻陷防线。';
    if (s === 'won' && State.level) {
      State.wins[State.level.id] = true;
      saveWins();
      const unlockedOrgan = unlockCodexOrgan(State.level.id);
      buildLevelMenu();
      spawnConfetti(60);
      if (unlockedOrgan) {
        document.getElementById('result-lead').textContent += ` 已解锁器官档案：${CODEX_ORGANS[State.level.id]?.name || State.level.id}。`;
      }
      SFX.win();
    } else if (s === 'lost') {
      resEl.classList.add('lose');
      document.getElementById('confetti').innerHTML = '';
      SFX.lose();
    }
    SFX.stopBGM();
    resEl.classList.remove('hidden');
  }
}

/* === Input handling === */
canvas.addEventListener('mousemove', (ev) => {
  const rect = canvas.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
  const y = (ev.clientY - rect.top) * (canvas.height / rect.height);
  State.hoverCell = cellAt(x, y);

  // hovered tower
  let hovered = null;
  for (const tw of State.towers) {
    if (Math.hypot(tw.x - x, tw.y - y) < 22) { hovered = tw; break; }
  }
  State.hoveredTower = hovered;
});
canvas.addEventListener('mouseleave', () => {
  State.hoverCell = null;
  State.hoveredTower = null;
});
canvas.addEventListener('click', (ev) => {
  if (State.scene !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
  const y = (ev.clientY - rect.top) * (canvas.height / rect.height);
  // ===== Phase L · 玩家操作扩展 (shovel click) =====
  if (State.shovelMode) {
    let target = null, td = Infinity;
    for (const tw of State.towers) {
      const d = Math.hypot(tw.x - x, tw.y - y);
      if (d < 26 && d < td) { td = d; target = tw; }
    }
    if (target) refundTower(target);
    return;
  }
  if (!State.selectedTower) return;
  const cell = cellAt(x, y);
  if (!cell) return;
  if (!isPlaceable(cell.c, cell.r)) return;
  if (State.bossInfectActive) {
    pushFloater(cell.c * TILE + TILE / 2, cell.r * TILE + TILE / 2, '感染中无法放置!', '#ff3b6b');
    return;
  }
  const def = TOWERS[State.selectedTower];
  // ===== Phase L · 玩家操作扩展 (overlap pricing) =====
  const __overlap = towersAtCell(cell.c, cell.r) >= 1;
  const __baseCost = getTowerCost(State.selectedTower);
  const cost = __overlap ? Math.ceil(__baseCost * 1.3) : __baseCost;
  if (State.o2 < cost) {
    pushFloater(cell.c * TILE + TILE / 2, cell.r * TILE + TILE / 2, '氧气不足', '#ff3b6b');
    return;
  }
  State.o2 -= cost;
  SFX.place();
  // ===== Phase K · 双向战斗 + 塔有生命 (placement) =====
  const __towerMaxHp = TOWERS[State.selectedTower].maxHp || 100;
  // ===== Phase L · 玩家操作扩展 (overlap offset) =====
  const __offset = __overlap ? 6 : 0;
  State.towers.push({
    kind: State.selectedTower,
    gridC: cell.c, gridR: cell.r,
    x: cell.c * TILE + TILE / 2 + __offset,
    y: cell.r * TILE + TILE / 2 + __offset,
    cd: 0,
    hp: __towerMaxHp,
    maxHp: __towerMaxHp,
    flash: 0,
    stackIndex: __overlap ? 1 : 0,
    paidCost: cost,
  });
  const placedTower = State.towers[State.towers.length - 1];
  // placement burst
  const cx = cell.c * TILE + TILE / 2, cy = cell.r * TILE + TILE / 2;
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 120;
    State.particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      r: 2 + Math.random() * 2,
      color: def.color,
      life: 0.5, max: 0.5, gravity: 0,
    });
  }
  pushFloater(cx, cy - 24, `-${cost} O₂`, def.color);
  if (placedTower.kind === 'red_blood') {
    const envBonus = getRedBloodEnvironmentBonus(placedTower);
    if (envBonus > 0) {
      pushFloater(cx, cy - 44, `肺泡富氧 +${envBonus} O₂/s`, '#9bf3ff');
    }
  }
});
window.addEventListener('keydown', (ev) => {
  if (ev.key === 'Escape') { State.selectedTower = null; document.querySelectorAll('.tower-card').forEach(c => c.classList.remove('selected')); canvas.classList.remove('placing'); exitShovelMode(); }
  if (ev.key === ' ') { ev.preventDefault(); if (State.scene === 'playing' && !State.waveActive && !State.awaitingUpgrade) startWave(); }
  if (ev.key === 'f' || ev.key === 'F') { castFever(); }
  if (ev.key === 'g' || ev.key === 'G') { castSurge(); }
  // ===== Phase M · 身体状态系统 (hotkey H) =====
  if (ev.key === 'h' || ev.key === 'H') { castAntibiotic(); }
  if (ev.key === '1') selectByIndex(0);
  if (ev.key === '2') selectByIndex(1);
  if (ev.key === '3') selectByIndex(2);
});
function selectByIndex(i) {
  const cards = document.querySelectorAll('.tower-card');
  if (cards[i]) cards[i].click();
}

document.getElementById('btn-wave').addEventListener('click', () => { SFX.click(); startWave(); });
document.getElementById('btn-fever').addEventListener('click', () => { SFX.click(); castFever(); });
document.getElementById('btn-surge').addEventListener('click', () => { SFX.click(); castSurge(); });
// ===== Phase M · 身体状态系统 (antibiotic button) =====
document.getElementById('btn-antibiotic').addEventListener('click', () => { SFX.click(); castAntibiotic(); });
// ===== Phase L · 玩家操作扩展 (shovel button) =====
document.getElementById('btn-shovel').addEventListener('click', () => {
  SFX.click();
  if (State.shovelMode) exitShovelMode();
  else enterShovelMode();
});
document.getElementById('btn-menu').addEventListener('click', () => { SFX.click(); setScene('menu'); });
document.getElementById('btn-open-codex').addEventListener('click', () => { SFX.click(); openCodex(); });
document.getElementById('btn-open-codex-menu').addEventListener('click', () => { SFX.click(); openCodex(); });
document.getElementById('btn-close-codex').addEventListener('click', () => { SFX.click(); closeCodex(); });
document.getElementById('btn-mute').addEventListener('click', (ev) => {
  const newMuted = !SFX.isMuted();
  SFX.setMuted(newMuted);
  ev.target.textContent = newMuted ? '🔇' : '🔊';
  if (!newMuted && State.scene === 'playing') { SFX.init(); SFX.startBGM(State.level); }
});
// 全局首次交互启动 AudioContext（浏览器策略）
let audioBooted = false;
function bootAudioOnce() {
  if (audioBooted) return; audioBooted = true;
  SFX.init();
}
window.addEventListener('pointerdown', bootAudioOnce, { once: true });
window.addEventListener('keydown', bootAudioOnce, { once: true });
document.getElementById('btn-back-menu').addEventListener('click', () => { SFX.click(); setScene('menu'); });
document.getElementById('btn-retry').addEventListener('click', () => { SFX.click(); startLevel(State.level); });

/* === BOOT === */
State.wins = loadWins();
State.codex = loadCodex();
buildLevelMenu();
setScene('menu');
syncHUD();
requestAnimationFrame((t) => { lastTime = t; loop(t); });
</script>
